<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>位置エネルギー — 仕事とエネルギー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      min-height: 100dvh;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: #4a7099;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: min(520px, 92vw);
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 15px;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 30px;
    }

    .hint {
      margin: 0;
      font-size: 0.82rem;
      color: #4a7099;
      line-height: 1.55;
    }

    .formula-box {
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0, 140, 220, 0.08);
      font-size: 0.88rem;
      font-weight: 600;
      color: #004c99;
      text-align: center;
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-row button {
      flex: 1 1 calc(33% - 8px);
      min-width: 88px;
      padding: 14px 10px;
      min-height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #dropBtn {
      background: #00aaff;
      color: white;
      border: none;
      box-shadow: 0 0 10px #66d0ff;
    }

    #pauseBtn,
    #resetBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }

    #statusPanel {
      width: min(520px, 92vw);
      margin: 10px 0 0;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(0, 140, 220, 0.2);
      color: #004c99;
    }

    #statusPanel.falling { color: #0066bb; border-color: rgba(0, 102, 187, 0.28); }
    #statusPanel.ground { color: #007744; border-color: rgba(0, 119, 68, 0.28); }

    .canvas-section {
      width: 95vw;
      max-width: 640px;
      margin-top: 8px;
    }

    .canvas-wrap {
      width: 100%;
      height: min(440px, 54dvh);
      min-height: 300px;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 12px;
      background: white;
      touch-action: none;
      box-shadow: 0 0 16px rgba(0, 150, 255, 0.25);
    }

    .legend {
      width: min(520px, 92vw);
      margin: 10px 0 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.45);
      font-size: 0.82rem;
      line-height: 1.8;
      color: #4a7099;
    }

    .legend span { font-weight: 600; }
    .lg-u { color: #0088dd; }
    .lg-k { color: #22aa55; }
    .lg-e { color: #8844cc; }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>位置エネルギー</h2>
    <p class="chapter-label">6章　仕事とエネルギー — U = mgh</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <label>
      高さ h (m):
      <input id="hSlider" type="range" min="0" max="10" step="0.1" value="6">
      <span id="hValue">6.0</span>
    </label>

    <label>
      質量 m (kg):
      <input id="mSlider" type="range" min="1" max="20" step="0.5" value="5">
      <span id="mValue">5.0</span>
    </label>

    <label>
      重力 g (m/s²):
      <input id="gSlider" type="range" min="5" max="15" step="0.1" value="9.8">
      <span id="gValue">9.8</span>
    </label>

    <p class="formula-box">
      U = m g h　　K = ½ m v²　　U + K = 一定
    </p>

    <p class="hint">
      スライダーで高さ h を変えると U = mgh が変わります。落下開始で U が K に変わる様子（エネルギー保存）を確認できます。
    </p>

    <div class="btn-row">
      <button id="dropBtn" type="button">落下開始</button>
      <button id="pauseBtn" type="button">停止</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div id="statusPanel">高さを設定して「落下開始」</div>

  <div class="canvas-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div class="legend">
    <span class="lg-u">■ 左：位置エネルギー U</span>　
    <span class="lg-k">■ 右：運動エネルギー K</span>　
    <span class="lg-e">U + K = E</span>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const canvasWrap = document.getElementById("canvasWrap");
    const statusPanel = document.getElementById("statusPanel");
    const hSlider = document.getElementById("hSlider");
    const mSlider = document.getElementById("mSlider");
    const gSlider = document.getElementById("gSlider");

    const MAX_DT = 1 / 30;
    const H_MAX = 10;
    const MARGIN = { left: 72, right: 72, top: 36, bottom: 44 };

    let h = 6;
    let v = 0;
    let h0 = 6;
    let E0 = 0;
    let simM = 5;
    let simG = 9.8;
    let falling = false;
    let running = false;
    let paused = false;

    const DEFAULTS = { h: 6, m: 5, g: 9.8 };

    function fmt(n, d) {
      return Number(n).toFixed(d);
    }

    function getM() {
      return falling ? simM : parseFloat(mSlider.value);
    }

    function getG() {
      return falling ? simG : parseFloat(gSlider.value);
    }

    function getU() {
      return getM() * getG() * Math.max(0, h);
    }

    function getK() {
      if (!falling && !running) return 0;
      return Math.max(0, E0 - getU());
    }

    function syncSliders() {
      if (!falling) {
        h = parseFloat(hSlider.value);
      }
      document.getElementById("hValue").textContent = fmt(falling ? h : parseFloat(hSlider.value), 1);
      document.getElementById("mValue").textContent = fmt(parseFloat(mSlider.value), 1);
      document.getElementById("gValue").textContent = fmt(parseFloat(gSlider.value), 1);
    }

    function resetSimulation() {
      hSlider.value = DEFAULTS.h;
      mSlider.value = DEFAULTS.m;
      gSlider.value = DEFAULTS.g;
      h = DEFAULTS.h;
      h0 = DEFAULTS.h;
      v = 0;
      simM = DEFAULTS.m;
      simG = DEFAULTS.g;
      E0 = simM * simG * h;
      falling = false;
      running = false;
      paused = false;
      hSlider.disabled = false;
      mSlider.disabled = false;
      gSlider.disabled = false;
      syncSliders();
      statusPanel.textContent = "高さを設定して「落下開始」";
      statusPanel.className = "";
    }

    function startDrop() {
      if (falling && running && !paused) return;
      if (h <= 0.05 && !falling) {
        statusPanel.textContent = "h > 0 にしてから落下開始してください";
        statusPanel.className = "";
        return;
      }
      if (!falling) {
        h = parseFloat(hSlider.value);
        h0 = h;
        simM = parseFloat(mSlider.value);
        simG = parseFloat(gSlider.value);
        E0 = simM * simG * h0;
        v = 0;
        falling = true;
        hSlider.disabled = true;
        mSlider.disabled = true;
        gSlider.disabled = true;
      }
      running = true;
      paused = false;
      syncSliders();
    }

    function pauseSimulation() {
      if (!running) return;
      paused = !paused;
      statusPanel.textContent = paused ? "一時停止中" : "落下中 — U が K に変わっています";
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const w = Math.max(280, Math.round(rect.width));
      const ht = Math.max(240, Math.round(rect.height));
      if (canvas.width !== w || canvas.height !== ht) {
        canvas.width = w;
        canvas.height = ht;
      }
    }

    hSlider.addEventListener("input", () => {
      if (!falling) {
        h = parseFloat(hSlider.value);
        E0 = getM() * getG() * h;
      }
      syncSliders();
    });
    [mSlider, gSlider].forEach((s) => {
      s.addEventListener("input", () => {
        if (!falling) E0 = getM() * getG() * h;
        syncSliders();
      });
    });

    document.getElementById("dropBtn").addEventListener("click", (e) => {
      e.preventDefault();
      startDrop();
    });
    document.getElementById("pauseBtn").addEventListener("click", (e) => {
      e.preventDefault();
      pauseSimulation();
    });
    document.getElementById("resetBtn").addEventListener("click", (e) => {
      e.preventDefault();
      resetSimulation();
    });

    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(resizeCanvas).observe(canvasWrap);
    }

    requestAnimationFrame(() => {
      resizeCanvas();
      resetSimulation();
    });

    function update(dt) {
      if (!running || paused || !falling) return;
      const g = simG;
      v += g * dt;
      h -= v * dt;
      if (h <= 0) {
        h = 0;
        v = 0;
        running = false;
        paused = false;
      }
    }

    function heightToY(heightM, groundY, plotH) {
      return groundY - (heightM / H_MAX) * plotH;
    }

    function drawVerticalBar(x, yTop, barH, fillH, color, label, valueJ, maxE) {
      const w = 28;
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillRect(x - 6, yTop - 22, w + 12, barH + 36);
      ctx.strokeStyle = "rgba(0,76,153,0.12)";
      ctx.strokeRect(x - 6, yTop - 22, w + 12, barH + 36);

      ctx.fillStyle = "rgba(0,76,153,0.08)";
      ctx.fillRect(x, yTop, w, barH);
      const fill = maxE > 0 ? Math.min(1, fillH / maxE) : 0;
      ctx.fillStyle = color;
      ctx.fillRect(x, yTop + barH * (1 - fill), w, barH * fill);

      ctx.fillStyle = color;
      ctx.font = "600 11px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label, x + w / 2, yTop - 8);
      ctx.font = "600 10px Inter, Noto Sans JP, sans-serif";
      ctx.fillText(`${fmt(valueJ, 0)} J`, x + w / 2, yTop + barH + 16);
      ctx.textAlign = "start";
    }

    function drawBall(cx, cy, r, m) {
      const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
      grad.addColorStop(0, "#aee0ff");
      grad.addColorStop(0.55, "#0088dd");
      grad.addColorStop(1, "#004c99");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#003366";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = "#004c99";
      ctx.font = "600 11px Inter, Noto Sans JP, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(`m=${fmt(m, 1)}`, cx, cy + r + 16);
      ctx.textAlign = "start";
    }

    function drawScene() {
      const w = canvas.width;
      const ht = canvas.height;
      const groundY = ht - MARGIN.bottom;
      const plotTop = MARGIN.top;
      const plotH = groundY - plotTop;
      const cx = (MARGIN.left + w - MARGIN.right) / 2 + MARGIN.left * 0.5;
      const cy = heightToY(h, groundY, plotH);
      const r = 14 + Math.min(10, getM() * 0.4);

      const U = getU();
      const K = getK();
      const E = U + K;
      const maxE = Math.max(E0, simM * simG * H_MAX, 1);

      ctx.clearRect(0, 0, w, ht);
      ctx.fillStyle = "#f8fcff";
      ctx.fillRect(0, 0, w, ht);

      ctx.fillStyle = "#eef6ff";
      ctx.fillRect(MARGIN.left, plotTop, w - MARGIN.left - MARGIN.right, plotH);

      ctx.fillStyle = "#8bc98a";
      ctx.fillRect(MARGIN.left, groundY, w - MARGIN.left - MARGIN.right, ht - groundY);
      ctx.strokeStyle = "#5a9a55";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(MARGIN.left, groundY);
      ctx.lineTo(w - MARGIN.right, groundY);
      ctx.stroke();
      ctx.fillStyle = "#4a7099";
      ctx.font = "11px Inter, Poppins, sans-serif";
      ctx.fillText("地面 h = 0", MARGIN.left + 4, groundY + 18);

      ctx.strokeStyle = "rgba(0,100,180,0.15)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      for (let i = 0; i <= 5; i += 1) {
        const hm = (H_MAX * i) / 5;
        const y = heightToY(hm, groundY, plotH);
        ctx.beginPath();
        ctx.moveTo(MARGIN.left, y);
        ctx.lineTo(w - MARGIN.right, y);
        ctx.stroke();
        ctx.fillStyle = "#7a9fbf";
        ctx.font = "10px Inter, Poppins, sans-serif";
        ctx.fillText(`${hm} m`, MARGIN.left + 6, y - 4);
      }
      ctx.setLineDash([]);

      ctx.strokeStyle = "rgba(0,140,220,0.5)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx, groundY);
      ctx.lineTo(cx, cy);
      ctx.stroke();
      ctx.fillStyle = "#0088dd";
      ctx.font = "600 12px Inter, Noto Sans JP, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(`h = ${fmt(h, 1)} m`, cx + 36, (cy + groundY) / 2);
      ctx.textAlign = "start";

      drawVerticalBar(18, plotTop + 10, plotH - 20, U, "#0088dd", "U", U, maxE);
      drawVerticalBar(w - 46, plotTop + 10, plotH - 20, K, "#22aa55", "K", K, maxE);

      drawBall(cx, cy, r, getM());

      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.fillRect(12, 12, 188, 100);
      ctx.strokeStyle = "rgba(0,76,153,0.15)";
      ctx.strokeRect(12, 12, 188, 100);
      ctx.font = "600 13px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.fillStyle = "#004c99";
      ctx.fillText(`m = ${fmt(getM(), 1)} kg`, 22, 32);
      ctx.fillText(`h = ${fmt(h, 1)} m`, 22, 52);
      ctx.fillStyle = "#0088dd";
      ctx.fillText(`U = ${fmt(U, 0)} J`, 22, 72);
      ctx.fillStyle = "#22aa55";
      ctx.fillText(`K = ${fmt(K, 0)} J`, 22, 92);
      ctx.fillStyle = "#8844cc";
      ctx.font = "600 11px Inter, Noto Sans JP, sans-serif";
      ctx.fillText(`E = U+K = ${fmt(E, 0)} J`, 22, 108);

      if (falling && running && !paused) {
        statusPanel.textContent = "落下中 — U が減り K が増える（E = U + K は一定）";
        statusPanel.className = "falling";
      } else if (h <= 0.01 && falling) {
        statusPanel.textContent = "地面に着きました — U → 0、K → E";
        statusPanel.className = "ground";
      } else if (!falling) {
        statusPanel.textContent = h > 0.05
          ? `U = ${fmt(U, 0)} J — 落下開始で K に変換`
          : "h > 0 にしてから落下開始";
        statusPanel.className = "";
      }
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, MAX_DT);
      last = now;
      update(dt);
      syncSliders();
      drawScene();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
