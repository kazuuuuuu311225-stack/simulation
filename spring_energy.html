<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>弾性エネルギー — 仕事とエネルギー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      min-height: 100dvh;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: #4a7099;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: min(520px, 92vw);
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 15px;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 30px;
    }

    .hint {
      margin: 0;
      font-size: 0.82rem;
      color: #4a7099;
      line-height: 1.55;
    }

    .formula-box {
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0, 140, 220, 0.08);
      font-size: 0.88rem;
      font-weight: 600;
      color: #004c99;
      text-align: center;
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-row button {
      flex: 1 1 calc(33% - 8px);
      min-width: 88px;
      padding: 14px 10px;
      min-height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #releaseBtn {
      background: #00aaff;
      color: white;
      border: none;
      box-shadow: 0 0 10px #66d0ff;
    }

    #pauseBtn,
    #resetBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }

    #statusPanel {
      width: min(520px, 92vw);
      margin: 10px 0 0;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(0, 140, 220, 0.2);
      color: #004c99;
    }

    #statusPanel.motion { color: #0066bb; border-color: rgba(0, 102, 187, 0.28); }
    #statusPanel.ready { color: #007744; border-color: rgba(0, 119, 68, 0.28); }

    .canvas-section {
      width: 95vw;
      max-width: 640px;
      margin-top: 8px;
    }

    .canvas-wrap {
      width: 100%;
      height: min(420px, 52dvh);
      min-height: 280px;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 12px;
      background: white;
      touch-action: none;
      box-shadow: 0 0 16px rgba(0, 150, 255, 0.25);
    }

    .legend {
      width: min(520px, 92vw);
      margin: 10px 0 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.45);
      font-size: 0.82rem;
      line-height: 1.8;
      color: #4a7099;
    }

    .legend span { font-weight: 600; }
    .lg-u { color: #0088dd; }
    .lg-k { color: #22aa55; }
    .lg-f { color: #ff8800; }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>弾性エネルギー</h2>
    <p class="chapter-label">6章　仕事とエネルギー — U = ½kx²</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <label>
      バネの伸び x (m):
      <input id="xSlider" type="range" min="-2" max="2" step="0.05" value="1.2">
      <span id="xValue">1.20</span>
    </label>

    <label>
      バネ定数 k (N/m):
      <input id="kSlider" type="range" min="10" max="200" step="5" value="80">
      <span id="kValue">80</span>
    </label>

    <label>
      質量 m (kg):
      <input id="mSlider" type="range" min="1" max="10" step="0.5" value="2">
      <span id="mValue">2.0</span>
    </label>

    <p class="formula-box">
      F = −k x　　U = ½ k x²　　K = ½ m v²　　U + K = 一定
    </p>

    <p class="hint">
      x = 0 が自然長（つり合い位置）。x をずらしてから「離す」と、バネが縮みながら U が K に変わります。
    </p>

    <div class="btn-row">
      <button id="releaseBtn" type="button">離す</button>
      <button id="pauseBtn" type="button">停止</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div id="statusPanel">x を設定して「離す」</div>

  <div class="canvas-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div class="legend">
    <span class="lg-u">■ 左：弾性エネルギー U</span>　
    <span class="lg-k">■ 右：運動エネルギー K</span>　
    <span class="lg-f">→ オレンジ：バネの力 F</span>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const canvasWrap = document.getElementById("canvasWrap");
    const statusPanel = document.getElementById("statusPanel");
    const xSlider = document.getElementById("xSlider");
    const kSlider = document.getElementById("kSlider");
    const mSlider = document.getElementById("mSlider");

    const MAX_DT = 1 / 30;
    const X_MIN = -2;
    const X_MAX = 2;
    const MARGIN = { left: 72, right: 72, top: 48, bottom: 52 };
    const E_MAX_REF = 0.5 * 200 * 4;

    let x = 1.2;
    let v = 0;
    let simK = 80;
    let simM = 2;
    let E0 = 0;
    let oscillating = false;
    let running = false;
    let paused = false;

    const DEFAULTS = { x: 1.2, k: 80, m: 2 };

    function fmt(n, d) {
      return Number(n).toFixed(d);
    }

    function getK() {
      return oscillating ? simK : parseFloat(kSlider.value);
    }

    function getM() {
      return oscillating ? simM : parseFloat(mSlider.value);
    }

    function getU() {
      return 0.5 * getK() * x * x;
    }

    function getKEnergy() {
      if (!oscillating && !running) return 0;
      return Math.max(0, E0 - getU());
    }

    function getForce() {
      return -getK() * x;
    }

    function syncSliders() {
      if (!oscillating) x = parseFloat(xSlider.value);
      document.getElementById("xValue").textContent = fmt(x, 2);
      document.getElementById("kValue").textContent = fmt(parseFloat(kSlider.value), 0);
      document.getElementById("mValue").textContent = fmt(parseFloat(mSlider.value), 1);
    }

    function setSlidersEnabled(on) {
      xSlider.disabled = !on;
      kSlider.disabled = !on;
      mSlider.disabled = !on;
    }

    function resetSimulation() {
      xSlider.value = DEFAULTS.x;
      kSlider.value = DEFAULTS.k;
      mSlider.value = DEFAULTS.m;
      x = DEFAULTS.x;
      v = 0;
      simK = DEFAULTS.k;
      simM = DEFAULTS.m;
      E0 = 0.5 * simK * x * x;
      oscillating = false;
      running = false;
      paused = false;
      setSlidersEnabled(true);
      syncSliders();
      statusPanel.textContent = "x を設定して「離す」";
      statusPanel.className = "";
    }

    function releaseSpring() {
      if (oscillating && running && !paused) return;
      if (!oscillating) {
        x = parseFloat(xSlider.value);
        if (Math.abs(x) < 0.05) {
          statusPanel.textContent = "|x| > 0 の位置で「離す」してください";
          statusPanel.className = "";
          return;
        }
        simK = parseFloat(kSlider.value);
        simM = parseFloat(mSlider.value);
        E0 = 0.5 * simK * x * x;
        v = 0;
        oscillating = true;
        setSlidersEnabled(false);
      }
      running = true;
      paused = false;
      syncSliders();
    }

    function pauseSimulation() {
      if (!running) return;
      paused = !paused;
      statusPanel.textContent = paused ? "一時停止中" : "運動中 — U が K に変わっています";
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const w = Math.max(280, Math.round(rect.width));
      const h = Math.max(220, Math.round(rect.height));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    xSlider.addEventListener("input", () => {
      if (!oscillating) {
        x = parseFloat(xSlider.value);
        E0 = 0.5 * getK() * x * x;
      }
      syncSliders();
    });
    [kSlider, mSlider].forEach((s) => {
      s.addEventListener("input", () => {
        if (!oscillating) E0 = 0.5 * getK() * x * x;
        syncSliders();
      });
    });

    document.getElementById("releaseBtn").addEventListener("click", (e) => {
      e.preventDefault();
      releaseSpring();
    });
    document.getElementById("pauseBtn").addEventListener("click", (e) => {
      e.preventDefault();
      pauseSimulation();
    });
    document.getElementById("resetBtn").addEventListener("click", (e) => {
      e.preventDefault();
      resetSimulation();
    });

    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(resizeCanvas).observe(canvasWrap);
    }

    requestAnimationFrame(() => {
      resizeCanvas();
      resetSimulation();
    });

    function update(dt) {
      if (!running || paused || !oscillating) return;
      const k = simK;
      const m = simM;
      const a = (-k * x) / m;
      v += a * dt;
      x += v * dt;
    }

    function layoutMetrics(w, h) {
      const plotLeft = MARGIN.left + 36;
      const plotRight = w - MARGIN.right - 8;
      const plotW = plotRight - plotLeft;
      const cy = h * 0.52;
      const ppm = plotW / (X_MAX - X_MIN);
      const eqX = plotLeft + (-X_MIN / (X_MAX - X_MIN)) * plotW;
      return { plotLeft, plotRight, plotW, cy, ppm, eqX, barTop: MARGIN.top + 8, barH: h - MARGIN.top - MARGIN.bottom - 16 };
    }

    function xToPx(xM, lay) {
      return lay.eqX + xM * lay.ppm;
    }

    function drawVerticalBar(x, yTop, barH, fillVal, color, label, valueJ, maxE) {
      const bw = 28;
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillRect(x - 6, yTop - 22, bw + 12, barH + 36);
      ctx.strokeStyle = "rgba(0,76,153,0.12)";
      ctx.strokeRect(x - 6, yTop - 22, bw + 12, barH + 36);
      ctx.fillStyle = "rgba(0,76,153,0.08)";
      ctx.fillRect(x, yTop, bw, barH);
      const fill = maxE > 0 ? Math.min(1, fillVal / maxE) : 0;
      ctx.fillStyle = color;
      ctx.fillRect(x, yTop + barH * (1 - fill), bw, barH * fill);
      ctx.fillStyle = color;
      ctx.font = "600 11px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label, x + bw / 2, yTop - 8);
      ctx.font = "600 10px Inter, Noto Sans JP, sans-serif";
      ctx.fillText(`${fmt(valueJ, 0)} J`, x + bw / 2, yTop + barH + 16);
      ctx.textAlign = "start";
    }

    function drawWall(x, cy) {
      ctx.fillStyle = "#556677";
      ctx.fillRect(x - 14, cy - 70, 14, 140);
      ctx.strokeStyle = "#334455";
      ctx.lineWidth = 2;
      ctx.strokeRect(x - 14, cy - 70, 14, 140);
      for (let i = -60; i <= 60; i += 20) {
        ctx.beginPath();
        ctx.moveTo(x - 14, cy + i);
        ctx.lineTo(x - 24, cy + i - 10);
        ctx.stroke();
      }
    }

    function drawHorizontalSpring(x1, y, x2) {
      const coils = 10;
      const amp = 10;
      const len = Math.max(20, x2 - x1);
      const steps = coils * 2;
      const dx = len / steps;
      ctx.strokeStyle = "#cc5500";
      ctx.lineWidth = 4;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y);
      let px = x1;
      for (let i = 0; i < steps; i += 1) {
        px += dx;
        const py = y + (i % 2 === 0 ? amp : -amp);
        ctx.lineTo(px, py);
      }
      ctx.lineTo(x2, y);
      ctx.stroke();
      ctx.strokeStyle = "#ffaa33";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, y);
      px = x1;
      for (let i = 0; i < steps; i += 1) {
        px += dx;
        const py = y + (i % 2 === 0 ? amp : -amp);
        ctx.lineTo(px, py);
      }
      ctx.lineTo(x2, y);
      ctx.stroke();
    }

    function drawBox(cx, cy) {
      const bw = 56;
      const bh = 44;
      ctx.fillStyle = "#ddeeff";
      ctx.strokeStyle = "#4488bb";
      ctx.lineWidth = 2.5;
      ctx.fillRect(cx - bw / 2, cy - bh / 2, bw, bh);
      ctx.strokeRect(cx - bw / 2, cy - bh / 2, bw, bh);
    }

    function drawArrowFrom(x0, y0, dx, dy, color, lw) {
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 3) return;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x0 + dx, y0 + dy);
      ctx.stroke();
      const ang = Math.atan2(dy, dx);
      const head = Math.min(10, len * 0.28);
      const tx = x0 + dx;
      const ty = y0 + dy;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - head * Math.cos(ang - Math.PI / 7), ty - head * Math.sin(ang - Math.PI / 7));
      ctx.lineTo(tx - head * Math.cos(ang + Math.PI / 7), ty - head * Math.sin(ang + Math.PI / 7));
      ctx.closePath();
      ctx.fill();
    }

    function drawScene() {
      const w = canvas.width;
      const h = canvas.height;
      const lay = layoutMetrics(w, h);
      const U = getU();
      const K = getKEnergy();
      const E = U + K;
      const maxE = Math.max(E0, E_MAX_REF * 0.25, E, 1);
      const boxCx = xToPx(x, lay);
      const boxHalf = 28;
      const wallX = lay.plotLeft - 14;
      const springEnd = boxCx - boxHalf;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#f8fcff";
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = "#eef6ff";
      ctx.fillRect(lay.plotLeft, lay.cy - 78, lay.plotW, 156);

      ctx.strokeStyle = "rgba(0,140,220,0.35)";
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(lay.eqX, lay.cy - 72);
      ctx.lineTo(lay.eqX, lay.cy + 72);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#5a8ab0";
      ctx.font = "11px Inter, Poppins, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("x = 0", lay.eqX, lay.cy - 78);

      ctx.strokeStyle = "rgba(0,100,180,0.12)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 8; i += 1) {
        const xm = X_MIN + ((X_MAX - X_MIN) * i) / 8;
        const px = xToPx(xm, lay);
        ctx.beginPath();
        ctx.moveTo(px, lay.cy + 58);
        ctx.lineTo(px, lay.cy + 68);
        ctx.stroke();
        if (i % 2 === 0) ctx.fillText(`${fmt(xm, 1)}`, px, lay.cy + 82);
      }
      ctx.textAlign = "start";

      drawVerticalBar(18, lay.barTop, lay.barH, U, "#0088dd", "U", U, maxE);
      drawVerticalBar(w - 46, lay.barTop, lay.barH, K, "#22aa55", "K", K, maxE);

      drawWall(wallX, lay.cy);
      if (springEnd > wallX + 8) drawHorizontalSpring(wallX, lay.cy, springEnd);
      drawBox(boxCx, lay.cy);

      const F = getForce();
      if (Math.abs(F) > 0.5) {
        const fScale = 0.55;
        const fLen = Math.max(-80, Math.min(80, F * fScale));
        drawArrowFrom(boxCx, lay.cy + 34, fLen, 0, "#ff8800", 3);
        ctx.fillStyle = "#ff8800";
        ctx.font = "bold 11px Inter, Noto Sans JP, sans-serif";
        ctx.fillText(`F=${fmt(F, 0)}N`, boxCx + fLen + (fLen > 0 ? 6 : -58), lay.cy + 38);
      }

      if (Math.abs(v) > 0.05 && oscillating) {
        const vLen = Math.max(-70, Math.min(70, v * 12));
        drawArrowFrom(boxCx, lay.cy - 38, vLen, 0, "#22aa55", 2.5);
      }

      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.fillRect(12, 12, 196, 108);
      ctx.strokeStyle = "rgba(0,76,153,0.15)";
      ctx.strokeRect(12, 12, 196, 108);
      ctx.font = "600 13px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.fillStyle = "#004c99";
      ctx.fillText(`k = ${fmt(getK(), 0)} N/m`, 22, 32);
      ctx.fillText(`x = ${fmt(x, 2)} m`, 22, 52);
      ctx.fillStyle = "#0088dd";
      ctx.fillText(`U = ${fmt(U, 1)} J`, 22, 72);
      ctx.fillStyle = "#22aa55";
      ctx.fillText(`K = ${fmt(K, 1)} J`, 22, 92);
      ctx.fillStyle = "#8844cc";
      ctx.font = "600 11px Inter, Noto Sans JP, sans-serif";
      ctx.fillText(`E = U+K = ${fmt(E, 1)} J`, 22, 112);

      if (oscillating && running && !paused) {
        statusPanel.textContent = "運動中 — バネが縮むと U ↓、K ↑（E は一定）";
        statusPanel.className = "motion";
      } else if (oscillating && paused) {
        statusPanel.className = "";
      } else if (!oscillating) {
        statusPanel.textContent = Math.abs(x) > 0.05
          ? `U = ${fmt(U, 1)} J — 「離す」で K に変換`
          : "|x| > 0 の位置で「離す」";
        statusPanel.className = Math.abs(x) > 0.05 ? "ready" : "";
      }
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, MAX_DT);
      last = now;
      update(dt);
      syncSliders();
      drawScene();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
