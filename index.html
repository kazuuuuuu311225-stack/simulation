<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>物理シミュレーション</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(12px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 0 12px;
    }

    .app-header {
      text-align: center;
      padding: 12px 0 16px;
    }

    .app-header h1 {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    .app-header p {
      margin: 0;
      font-size: 0.92rem;
      color: #4a7099;
      line-height: 1.6;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      flex: 0 0 auto;
      padding: 10px 16px;
      min-height: 44px;
      border: 2px solid transparent;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      color: #4a7099;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, color 0.2s;
    }

    .tab.active {
      color: #004c99;
      background: rgba(255, 255, 255, 0.85);
      border-color: #00aaff;
      box-shadow: 0 0 14px rgba(0, 170, 255, 0.25);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .panel-card {
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
    }

    .sim-frame {
      display: block;
      width: 100%;
      min-height: 80dvh;
      border: 0;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>物理シミュレーション</h1>
      <p>高校物理の現象を、式と動きで確認できます。</p>
    </header>

    <nav class="tabs" role="tablist" aria-label="シミュレーション一覧">
      <button
        type="button"
        class="tab active"
        role="tab"
        id="tab-projectile"
        aria-selected="true"
        aria-controls="panel-projectile"
        data-tab="projectile"
      >
        斜方投射シミュレーション
      </button>
    </nav>

    <section
      class="tab-panel active"
      role="tabpanel"
      id="panel-projectile"
      aria-labelledby="tab-projectile"
    >
      <div class="panel-card">
        <iframe
          class="sim-frame"
          id="projectileFrame"
          src="simulation.html?embed=1"
          title="斜方投射シミュレーション"
        ></iframe>
      </div>
    </section>
  </div>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const panels = document.querySelectorAll(".tab-panel");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.tab;
        tabs.forEach((item) => {
          const active = item === tab;
          item.classList.toggle("active", active);
          item.setAttribute("aria-selected", active ? "true" : "false");
        });
        panels.forEach((panel) => {
          panel.classList.toggle("active", panel.id === "panel-" + target);
        });
      });
    });

    function resizeFrame() {
      const frame = document.getElementById("projectileFrame");
      if (!frame || !frame.contentWindow) return;
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const height = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, 640);
        frame.style.height = height + "px";
      } catch (error) {
        frame.style.height = "85dvh";
      }
    }

    const frame = document.getElementById("projectileFrame");
    if (frame) {
      frame.addEventListener("load", () => {
        resizeFrame();
        setTimeout(resizeFrame, 300);
      });
      window.addEventListener("resize", resizeFrame);
    }
  </script>
</body>
</html>
