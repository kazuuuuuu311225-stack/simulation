<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>物理シミュレーション</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 1rem max(12px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    .card {
      width: min(480px, 92vw);
      padding: 1.75rem;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.45);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 1.25rem;
      color: #4a7099;
      line-height: 1.6;
      text-align: center;
      font-size: 0.92rem;
    }

    .chapter-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chapter {
      padding: 1rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(0, 140, 220, 0.12);
    }

    .chapter-title {
      margin: 0 0 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      color: #004c99;
    }

    .chapter-badge {
      display: inline-block;
      margin-right: 0.35rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: #2a7fd4;
      letter-spacing: 0.04em;
    }

    .chapter-empty {
      margin: 0;
      font-size: 0.88rem;
      color: #7a9fbf;
      line-height: 1.5;
    }

    .sim-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .menu-link {
      display: block;
      padding: 14px 16px;
      min-height: 48px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      transition: transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .menu-link:hover {
      box-shadow: 0 0 16px #66d0ff;
    }

    .menu-link:active {
      transform: scale(0.98);
    }

    .menu-desc {
      display: block;
      margin-top: 4px;
      font-size: 0.82rem;
      font-weight: 400;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>物理シミュレーション</h1>
    <p class="subtitle">高校物理の現象を、式と動きで確認できます。</p>

    <ul class="chapter-list">
      <li class="chapter">
        <h2 class="chapter-title">
          <span class="chapter-badge">1章</span>物体の運動
        </h2>
        <ul class="sim-list">
          <li>
            <a class="menu-link" href="velocity.html">
              速度シミュレーション
              <span class="menu-desc">初速度と加速度から、位置 x(t) と速度 v(t) を確認</span>
            </a>
          </li>
        </ul>
      </li>

      <li class="chapter">
        <h2 class="chapter-title">
          <span class="chapter-badge">2章</span>落体の運動
        </h2>
        <ul class="sim-list">
          <li>
            <a class="menu-link" href="horizontal.html">
              水平投射シミュレーション
              <span class="menu-desc">台の高さを変えながら、水平投げの落下と飛距離を確認</span>
            </a>
          </li>
          <li>
            <a class="menu-link" href="simulation.html">
              斜方投射シミュレーション
              <span class="menu-desc">初速度・角度・重力を変えて軌道と式を確認</span>
            </a>
          </li>
        </ul>
      </li>
    </ul>
  </div>
</body>
</html>
