<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>斜方投射シミュレーション</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #003366;
      padding: 1rem;
    }

    .card {
      width: min(420px, 92vw);
      padding: 1.75rem;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.45);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    p {
      margin: 0 0 1.5rem;
      color: #4a7099;
      line-height: 1.6;
    }

    .menu-link {
      display: block;
      margin-bottom: 0.75rem;
      padding: 12px 20px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .menu-link:hover {
      box-shadow: 0 0 16px #66d0ff;
    }

    .menu-link:active {
      transform: scale(0.98);
    }

    .menu-link.secondary {
      background: rgba(255, 255, 255, 0.7);
      color: #004c99;
      box-shadow: none;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>斜方投射シミュレーション</h1>
    <p>初速度・角度・重力を変えながら、放物線の軌道とエネルギーの変化を確認できます。</p>
    <a class="menu-link" href="simulation.html">シミュレーションを開く</a>
    <a class="menu-link secondary" href="../projectile-quiz/index.html">斜方投射クイズへ</a>
  </div>
</body>
</html>
