<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>力のつりあい — 静力学</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: #4a7099;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: 90%;
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tab-label {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      color: #004c99;
    }

    .tab-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tab-row button {
      padding: 10px 12px;
      min-height: 42px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      border: 2px solid rgba(0, 170, 255, 0.22);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.65);
      color: #004c99;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-row button.active {
      background: #00aaff;
      color: white;
      border-color: #00aaff;
      box-shadow: 0 0 10px #66d0ff;
    }

    label {
      font-size: 15px;
      font-weight: 500;
    }

    label.hidden {
      display: none;
    }

    input[type="range"] {
      width: 100%;
      height: 30px;
    }

    .hint {
      margin: 0;
      font-size: 0.82rem;
      color: #4a7099;
      line-height: 1.5;
    }

    #resetBtn {
      padding: 14px 12px;
      min-height: 48px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      border: 2px solid rgba(0, 170, 255, 0.35);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #statusPanel {
      width: 90%;
      margin: 10px 0 0;
      padding: 14px 16px;
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 16px rgba(0, 100, 200, 0.12);
      text-align: center;
      font-size: 1.05rem;
      font-weight: 600;
    }

    #statusPanel.balanced {
      color: #007744;
      border: 2px solid rgba(0, 170, 100, 0.25);
    }

    #statusPanel.unbalanced {
      color: #cc3355;
      border: 2px solid rgba(204, 51, 85, 0.25);
    }

    .canvas-section {
      width: 95vw;
      max-width: 100%;
      margin-top: 8px;
    }

    .canvas-label {
      margin: 0 0 4px 4px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a7099;
    }

    .canvas-wrap {
      width: 100%;
      height: min(420px, 52dvh);
      min-height: 280px;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 12px;
      background: white;
      touch-action: none;
      box-shadow: 0 0 16px rgba(0, 150, 255, 0.25);
    }

    .legend {
      width: 90%;
      margin: 10px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.45);
      font-size: 0.82rem;
      line-height: 1.8;
      color: #4a7099;
    }

    .legend span { font-weight: 600; }
    .lg-mg { color: #0088dd; }
    .lg-n { color: #00b8d4; }
    .lg-ff { color: #ee4455; }
    .lg-f { color: #22aa55; }
    .lg-t { color: #8844cc; }
    .lg-fs { color: #ff8800; }
    .lg-net { color: #cc9900; }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>力のつりあい</h2>
    <p class="chapter-label">静力学 — 力のベクトルと合力</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <p class="tab-label">場面を選ぶ</p>
    <div class="tab-row" id="tabRow">
      <button type="button" class="tab-btn active" data-tab="table">机の上の物体のつり合い</button>
      <button type="button" class="tab-btn" data-tab="spring">ばねでつるされた物体のつり合い</button>
      <button type="button" class="tab-btn" data-tab="string">糸につるされた物体のつり合い</button>
      <button type="button" class="tab-btn" data-tab="friction">摩擦力が働く物体のつり合い</button>
      <button type="button" class="tab-btn" data-tab="angle">糸でつながれた物体と角度のつり合い</button>
    </div>

    <label id="mLabel">
      質量 m (kg):
      <input id="mSlider" type="range" min="0" max="10" step="0.1" value="2">
      <span id="mValue">2.0</span>
    </label>

    <label id="fLabel">
      外力 F (N):
      <input id="fSlider" type="range" min="0" max="50" step="1" value="0">
      <span id="fValue">0</span>
    </label>

    <label id="fsLabel" class="hidden">
      ばねの力 Fs (N):
      <input id="fsSlider" type="range" min="0" max="100" step="1" value="20">
      <span id="fsValue">20</span>
    </label>

    <label id="tLabel" class="hidden">
      張力 T (N):
      <input id="tSlider" type="range" min="0" max="100" step="1" value="20">
      <span id="tValue">20</span>
    </label>

    <label id="muLabel" class="hidden">
      摩擦係数 μ:
      <input id="muSlider" type="range" min="0" max="1" step="0.01" value="0.4">
      <span id="muValue">0.40</span>
    </label>

    <label id="thetaLabel" class="hidden">
      糸の角度 θ (°):
      <input id="thetaSlider" type="range" min="0" max="90" step="1" value="30">
      <span id="thetaValue">30</span>
    </label>

    <p id="hint" class="hint">机の上の物体：重力 mg と垂直抗力 N がつり合います。</p>

    <button id="resetBtn" type="button">リセット</button>
  </div>

  <div id="statusPanel" class="balanced">つりあっている</div>

  <div class="canvas-section">
    <p class="canvas-label">力のベクトル図</p>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const canvasWrap = document.getElementById("canvasWrap");
    const statusPanel = document.getElementById("statusPanel");
    const hintEl = document.getElementById("hint");
    const legendEl = document.getElementById("legend");
    const tabBtns = document.querySelectorAll(".tab-btn");

    const mSlider = document.getElementById("mSlider");
    const fSlider = document.getElementById("fSlider");
    const fsSlider = document.getElementById("fsSlider");
    const tSlider = document.getElementById("tSlider");
    const muSlider = document.getElementById("muSlider");
    const thetaSlider = document.getElementById("thetaSlider");

    const G = 9.8;
    const FORCE_SCALE = 2.2;
    const BALANCE_EPS = 0.15;

    let activeTab = "table";

    const TAB_META = {
      table: {
        hint: "机の上の物体：重力 mg（下）と垂直抗力 N（上）がつり合います。右向きの外力 F を加えると水平方向が不平衡になります。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-n">■ 垂直抗力 N</span>　<span class="lg-f">■ 外力 F</span>　<span class="lg-net">■ 合力</span>',
        defaults: { m: 2, F: 0 }
      },
      spring: {
        hint: "ばねでつるした物体：重力 mg（下）とばねの力 Fs（上）がつり合います。Fs = mg のとき平衡です。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-fs">■ ばねの力 Fs</span>　<span class="lg-net">■ 合力</span>',
        defaults: { m: 2, Fs: 20 }
      },
      string: {
        hint: "糸でつるした物体：重力 mg（下）と張力 T（上）がつり合います。T = mg のとき平衡です。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-t">■ 張力 T</span>　<span class="lg-net">■ 合力</span>',
        defaults: { m: 2, T: 20 }
      },
      friction: {
        hint: "摩擦力：垂直方向は N = mg。水平方向は外力 F と摩擦力 Ff（赤）がつり合います。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-n">■ 垂直抗力 N</span>　<span class="lg-f">■ 外力 F</span>　<span class="lg-ff">■ 摩擦力 Ff</span>　<span class="lg-net">■ 合力</span>',
        defaults: { m: 2, F: 15, mu: 0.4 }
      },
      angle: {
        hint: "糸でつながれた物体：糸が角度 θ で左上に張力 T を加えます。垂直抗力 N と摩擦力 Ff も働きます。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-n">■ 垂直抗力 N</span>　<span class="lg-t">■ 張力 T</span>　<span class="lg-ff">■ 摩擦力 Ff</span>　<span class="lg-net">■ 合力</span>',
        defaults: { m: 2, T: 20, mu: 0.4, theta: 30 }
      }
    };

    function fmt(v, d) {
      return Number(v).toFixed(d);
    }

    function syncSliders() {
      document.getElementById("mValue").textContent = fmt(parseFloat(mSlider.value), 1);
      document.getElementById("fValue").textContent = fSlider.value;
      document.getElementById("fsValue").textContent = fsSlider.value;
      document.getElementById("tValue").textContent = tSlider.value;
      document.getElementById("muValue").textContent = fmt(parseFloat(muSlider.value), 2);
      document.getElementById("thetaValue").textContent = thetaSlider.value;
    }

    function updateTabUI() {
      tabBtns.forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === activeTab));
      document.getElementById("fLabel").classList.toggle("hidden", activeTab !== "table" && activeTab !== "friction");
      document.getElementById("fsLabel").classList.toggle("hidden", activeTab !== "spring");
      document.getElementById("tLabel").classList.toggle("hidden", activeTab !== "string" && activeTab !== "angle");
      document.getElementById("muLabel").classList.toggle("hidden", activeTab !== "friction" && activeTab !== "angle");
      document.getElementById("thetaLabel").classList.toggle("hidden", activeTab !== "angle");
      hintEl.textContent = TAB_META[activeTab].hint;
      legendEl.innerHTML = TAB_META[activeTab].legend;
    }

    function staticFriction(hPull, ffMax) {
      if (hPull > 0.001) return -Math.min(ffMax, hPull);
      if (hPull < -0.001) return Math.min(ffMax, -hPull);
      return 0;
    }

    function computeForces() {
      const m = parseFloat(mSlider.value);
      const mg = m * G;
      const result = {
        tab: activeTab, m, mg,
        N: 0, F: 0, Ff: 0, Fs: 0, T: 0, Tx: 0, Ty: 0,
        netX: 0, netY: 0, netMag: 0,
        lines: []
      };

      if (activeTab === "table") {
        const F = parseFloat(fSlider.value);
        result.N = mg;
        result.F = F;
        result.netX = F;
        result.netY = 0;
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `N  = ${fmt(result.N, 1)} N`,
          `F  = ${fmt(F, 0)} N`
        ];
      } else if (activeTab === "spring") {
        const Fs = parseFloat(fsSlider.value);
        result.Fs = Fs;
        result.netY = Fs - mg;
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `Fs = ${fmt(Fs, 0)} N`
        ];
      } else if (activeTab === "string") {
        const T = parseFloat(tSlider.value);
        result.T = T;
        result.netY = T - mg;
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `T  = ${fmt(T, 0)} N`
        ];
      } else if (activeTab === "friction") {
        const F = parseFloat(fSlider.value);
        const mu = parseFloat(muSlider.value);
        result.N = mg;
        result.F = F;
        result.Ff = staticFriction(F, mu * mg);
        result.netX = F + result.Ff;
        result.netY = 0;
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `N  = ${fmt(result.N, 1)} N`,
          `F  = ${fmt(F, 0)} N`,
          `Ff = ${fmt(result.Ff, 1)} N`
        ];
      } else if (activeTab === "angle") {
        const T = parseFloat(tSlider.value);
        const mu = parseFloat(muSlider.value);
        const theta = parseFloat(thetaSlider.value) * Math.PI / 180;
        result.T = T;
        result.Tx = -T * Math.cos(theta);
        result.Ty = T * Math.sin(theta);
        result.N = Math.max(0, mg - result.Ty);
        result.Ff = staticFriction(result.Tx, mu * result.N);
        result.netX = result.Tx + result.Ff;
        result.netY = result.N + result.Ty - mg;
        result.thetaDeg = parseFloat(thetaSlider.value);
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `N  = ${fmt(result.N, 1)} N`,
          `T  = ${fmt(T, 0)} N  ∠${result.thetaDeg}°`,
          `Ff = ${fmt(result.Ff, 1)} N`
        ];
      }

      result.netMag = Math.sqrt(result.netX * result.netX + result.netY * result.netY);
      result.lines.push(`F_net = ${fmt(result.netMag, 1)} N`);
      return result;
    }

    function resetSimulation() {
      const d = TAB_META[activeTab].defaults;
      mSlider.value = d.m;
      if (d.F !== undefined) fSlider.value = d.F;
      if (d.Fs !== undefined) fsSlider.value = d.Fs;
      if (d.T !== undefined) tSlider.value = d.T;
      if (d.mu !== undefined) muSlider.value = d.mu;
      if (d.theta !== undefined) thetaSlider.value = d.theta;
      syncSliders();
    }

    function setTab(tab) {
      activeTab = tab;
      updateTabUI();
      resetSimulation();
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const w = Math.max(280, Math.round(rect.width));
      const h = Math.max(240, Math.round(rect.height));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    tabBtns.forEach((btn) => btn.addEventListener("click", () => setTab(btn.dataset.tab)));
    [mSlider, fSlider, fsSlider, tSlider, muSlider, thetaSlider].forEach((s) => {
      s.addEventListener("input", syncSliders);
      s.addEventListener("change", syncSliders);
    });
    document.getElementById("resetBtn").addEventListener("click", (e) => {
      e.preventDefault();
      resetSimulation();
    });

    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(resizeCanvas).observe(canvasWrap);
    }

    requestAnimationFrame(() => {
      resizeCanvas();
      updateTabUI();
      resetSimulation();
    });

    function drawArrow(ox, oy, vx, vy, color, lw, label) {
      const tx = ox + vx * FORCE_SCALE;
      const ty = oy - vy * FORCE_SCALE;
      const dx = tx - ox;
      const dy = ty - oy;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 2) return;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      const head = Math.min(11, len * 0.22);
      const ang = Math.atan2(dy, dx);
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - head * Math.cos(ang - Math.PI / 7), ty - head * Math.sin(ang - Math.PI / 7));
      ctx.lineTo(tx - head * Math.cos(ang + Math.PI / 7), ty - head * Math.sin(ang + Math.PI / 7));
      ctx.closePath();
      ctx.fill();
      ctx.font = "11px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.fillText(label, tx + 5, ty - 4);
    }

    function drawBlock(cx, cy, bw, bh) {
      ctx.fillStyle = "#ddeeff";
      ctx.strokeStyle = "#4488bb";
      ctx.lineWidth = 2;
      ctx.fillRect(cx - bw / 2, cy - bh / 2, bw, bh);
      ctx.strokeRect(cx - bw / 2, cy - bh / 2, bw, bh);
    }

    function drawGround(groundY, w) {
      ctx.fillStyle = "#8bc98a";
      ctx.fillRect(0, groundY, w, canvas.height - groundY);
      ctx.strokeStyle = "#5a9a55";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(36, groundY);
      ctx.lineTo(w - 36, groundY);
      ctx.stroke();
    }

    function drawInfoPanel(lines) {
      const h = 18 + lines.length * 18;
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.fillRect(10, 10, 220, h);
      ctx.strokeStyle = "rgba(0, 76, 153, 0.15)";
      ctx.strokeRect(10, 10, 220, h);
      ctx.fillStyle = "#004c99";
      ctx.font = "12px Inter, Poppins, Noto Sans JP, sans-serif";
      lines.forEach((line, i) => ctx.fillText(line, 18, 28 + i * 18));
    }

    function drawTableScene(forces, w, h) {
      const groundY = h * 0.72;
      const cx = w * 0.5;
      const cy = groundY - 24;
      drawGround(groundY, w);
      drawBlock(cx, cy, 72, 48);
      drawArrow(cx, cy, 0, -forces.mg, "#0088dd", 3, `mg=${fmt(forces.mg, 1)}N`);
      drawArrow(cx, cy, 0, forces.N, "#00b8d4", 3, `N=${fmt(forces.N, 1)}N`);
      if (forces.F > 0.01) drawArrow(cx, cy, forces.F, 0, "#22aa55", 3, `F=${fmt(forces.F, 0)}N`);
      drawArrow(cx, cy, forces.netX, forces.netY, "#cc9900", 3.5, `F_net=${fmt(forces.netMag, 1)}N`);
    }

    function drawSpringScene(forces, w, h) {
      const cx = w * 0.5;
      const cy = h * 0.55;
      const topY = h * 0.12;
      ctx.strokeStyle = "#888";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, topY);
      ctx.lineTo(cx, topY + 20);
      ctx.stroke();
      ctx.strokeStyle = "#ff8800";
      ctx.lineWidth = 2;
      let sy = topY + 20;
      for (let i = 0; i < 8; i += 1) {
        ctx.beginPath();
        ctx.moveTo(cx, sy);
        ctx.lineTo(cx + (i % 2 === 0 ? 14 : -14), sy + 12);
        ctx.stroke();
        sy += 12;
      }
      ctx.beginPath();
      ctx.moveTo(cx, sy);
      ctx.lineTo(cx, cy - 24);
      ctx.stroke();
      drawBlock(cx, cy, 56, 56);
      drawArrow(cx, cy, 0, -forces.mg, "#0088dd", 3, `mg=${fmt(forces.mg, 1)}N`);
      drawArrow(cx, cy, 0, forces.Fs, "#ff8800", 3, `Fs=${fmt(forces.Fs, 0)}N`);
      drawArrow(cx, cy, 0, forces.netY, "#cc9900", 3.5, `F_net=${fmt(forces.netMag, 1)}N`);
    }

    function drawStringScene(forces, w, h) {
      const cx = w * 0.5;
      const cy = h * 0.55;
      const topY = h * 0.1;
      ctx.strokeStyle = "#666";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, topY);
      ctx.lineTo(cx, cy - 28);
      ctx.stroke();
      ctx.fillStyle = "#666";
      ctx.fillRect(cx - 30, topY - 8, 60, 8);
      drawBlock(cx, cy, 56, 56);
      drawArrow(cx, cy, 0, -forces.mg, "#0088dd", 3, `mg=${fmt(forces.mg, 1)}N`);
      drawArrow(cx, cy, 0, forces.T, "#8844cc", 3, `T=${fmt(forces.T, 0)}N`);
      drawArrow(cx, cy, 0, forces.netY, "#cc9900", 3.5, `F_net=${fmt(forces.netMag, 1)}N`);
    }

    function drawFrictionScene(forces, w, h) {
      const groundY = h * 0.72;
      const cx = w * 0.5;
      const cy = groundY - 24;
      drawGround(groundY, w);
      drawBlock(cx, cy, 72, 48);
      drawArrow(cx, cy, 0, -forces.mg, "#0088dd", 3, `mg=${fmt(forces.mg, 1)}N`);
      drawArrow(cx, cy, 0, forces.N, "#00b8d4", 3, `N=${fmt(forces.N, 1)}N`);
      if (forces.F > 0.01) drawArrow(cx, cy, forces.F, 0, "#22aa55", 3, `F=${fmt(forces.F, 0)}N`);
      if (Math.abs(forces.Ff) > 0.01) drawArrow(cx, cy, forces.Ff, 0, "#ee4455", 3, `Ff=${fmt(forces.Ff, 1)}N`);
      drawArrow(cx, cy, forces.netX, forces.netY, "#cc9900", 3.5, `F_net=${fmt(forces.netMag, 1)}N`);
    }

    function drawAngleScene(forces, w, h) {
      const groundY = h * 0.72;
      const cx = w * 0.5;
      const cy = groundY - 24;
      const anchorX = cx - 90;
      const anchorY = cy - 70;
      drawGround(groundY, w);
      ctx.strokeStyle = "#666";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(anchorX, anchorY);
      ctx.lineTo(cx - 36, cy - 12);
      ctx.stroke();
      ctx.fillStyle = "#666";
      ctx.beginPath();
      ctx.arc(anchorX, anchorY, 5, 0, Math.PI * 2);
      ctx.fill();
      drawBlock(cx, cy, 72, 48);
      drawArrow(cx, cy, 0, -forces.mg, "#0088dd", 3, `mg=${fmt(forces.mg, 1)}N`);
      drawArrow(cx, cy, 0, forces.N, "#00b8d4", 3, `N=${fmt(forces.N, 1)}N`);
      drawArrow(cx, cy, forces.Tx, forces.Ty, "#8844cc", 3, `T=${fmt(forces.T, 0)}N`);
      if (Math.abs(forces.Ff) > 0.01) drawArrow(cx, cy, forces.Ff, 0, "#ee4455", 3, `Ff=${fmt(forces.Ff, 1)}N`);
      drawArrow(cx, cy, forces.netX, forces.netY, "#cc9900", 3.5, `F_net=${fmt(forces.netMag, 1)}N`);
    }

    function draw() {
      syncSliders();
      const forces = computeForces();
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#f8fcff";
      ctx.fillRect(0, 0, w, h);

      if (activeTab === "table") drawTableScene(forces, w, h);
      else if (activeTab === "spring") drawSpringScene(forces, w, h);
      else if (activeTab === "string") drawStringScene(forces, w, h);
      else if (activeTab === "friction") drawFrictionScene(forces, w, h);
      else drawAngleScene(forces, w, h);

      drawInfoPanel(forces.lines);
      const balanced = forces.netMag < BALANCE_EPS;
      statusPanel.textContent = balanced ? "つりあっている" : "つりあっていない";
      statusPanel.className = balanced ? "balanced" : "unbalanced";
    }

    function loop() {
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
