<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>力のつりあい — 静力学</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --accent-glow: rgba(59, 130, 246, 0.45);
      --slate-bg: rgba(15, 23, 42, 0.62);
      --slate-border: rgba(59, 130, 246, 0.22);
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #172554 42%, #1e293b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      min-height: 100dvh;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: var(--accent-light);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: rgba(59, 130, 246, 0.18);
      color: #dbeafe;
      border: 1px solid rgba(59, 130, 246, 0.42);
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: min(520px, 92vw);
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: var(--slate-bg);
      border: 1px solid var(--slate-border);
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tab-label {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent-light);
    }

    .tab-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }

    .tab-row button {
      flex: 0 0 auto;
      padding: 10px 14px;
      min-height: 44px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      border: 1px solid rgba(59, 130, 246, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: #cbd5e1;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .tab-row button.active {
      background: linear-gradient(135deg, #2563eb, var(--accent));
      color: white;
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: #cbd5e1;
    }

    label.hidden { display: none; }

    input[type="range"] {
      width: 100%;
      height: 28px;
      accent-color: var(--accent);
    }

    .hint {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-row button {
      flex: 1;
      padding: 14px 12px;
      min-height: 48px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #startBtn {
      background: linear-gradient(135deg, #2563eb, var(--accent));
      color: white;
      border: none;
      box-shadow: 0 0 18px var(--accent-glow);
    }

    #resetBtn {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 2px solid rgba(59, 130, 246, 0.32);
    }

    .sim-layout {
      width: min(960px, 95vw);
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @media (min-width: 760px) {
      .sim-layout {
        flex-direction: row;
        align-items: stretch;
      }

      #calcPanel {
        flex: 0 0 min(320px, 36vw);
        max-height: min(520px, 62dvh);
        overflow-y: auto;
      }

      .canvas-section { flex: 1; }
    }

    @media (max-width: 759px) {
      .canvas-section { order: -1; }
    }

    #calcPanel {
      padding: 16px;
      border-radius: 16px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: var(--slate-bg);
      border: 1px solid var(--slate-border);
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.35);
      line-height: 1.65;
    }

    #calcPanel h3 {
      margin: 0 0 6px;
      font-size: 1.05rem;
      color: var(--accent-light);
    }

    .concept {
      margin: 0 0 12px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .calc-block {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.14);
      border-left: 3px solid var(--accent);
    }

    .calc-block:last-child { margin-bottom: 0; }

    .calc-line {
      margin: 3px 0;
      font-size: 0.86rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .calc-line.net {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(59, 130, 246, 0.18);
      font-weight: 600;
      color: var(--accent-light);
    }

    #statusPanel {
      margin: 0 0 12px;
      padding: 10px 14px;
      border-radius: 10px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: var(--accent-light);
    }

    #statusPanel.broken {
      color: #fb923c;
      border-color: rgba(251, 146, 60, 0.35);
      background: rgba(251, 146, 60, 0.08);
    }

    #statusPanel.balanced {
      color: #34d399;
      border-color: rgba(52, 211, 153, 0.35);
      background: rgba(52, 211, 153, 0.08);
    }

    #statusPanel.unbalanced {
      color: #f87171;
      border-color: rgba(248, 113, 113, 0.35);
      background: rgba(248, 113, 113, 0.08);
    }

    .canvas-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .canvas-wrap {
      width: 100%;
      height: min(420px, 52dvh);
      min-height: 280px;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 14px;
      background: transparent;
      touch-action: none;
      box-shadow: 0 0 32px rgba(59, 130, 246, 0.18);
    }

    .canvas-caption {
      margin: 0;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .legend {
      width: min(960px, 95vw);
      margin: 8px 0 16px;
      padding: 10px 14px;
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(59, 130, 246, 0.15);
      font-size: 0.82rem;
      line-height: 1.8;
      color: var(--muted);
    }

    .legend span { font-weight: 600; }
    .lg-mg { color: #60a5fa; }
    .lg-n { color: #22d3ee; }
    .lg-ff { color: #f87171; }
    .lg-f { color: #34d399; }
    .lg-t { color: #a78bfa; }
    .lg-fs { color: #fb923c; }
    .lg-net { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>力のつりあい</h2>
    <p class="chapter-label">3章　力のつりあい</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <p class="tab-label">場面を選ぶ</p>
    <div class="tab-row" id="tabRow">
      <button type="button" class="tab-btn active" data-tab="table" title="机の上の物体のつり合い">机の上</button>
      <button type="button" class="tab-btn" data-tab="spring" title="ばねでつるされた物体のつり合い">ばね</button>
      <button type="button" class="tab-btn" data-tab="string" title="糸につるされた物体のつり合い">糸</button>
      <button type="button" class="tab-btn" data-tab="friction" title="摩擦力が働く物体のつり合い">摩擦</button>
      <button type="button" class="tab-btn" data-tab="angle" title="糸でつながれた物体と角度のつり合い">角度</button>
    </div>

    <label id="mLabel">
      質量 m (kg):
      <input id="mSlider" type="range" min="0" max="10" step="0.1" value="2">
      <span id="mValue">2.0</span>
    </label>

    <label id="fLabel">
      外力 F (N):
      <input id="fSlider" type="range" min="0" max="50" step="1" value="0">
      <span id="fValue">0</span>
    </label>

    <label id="fsLabel" class="hidden">
      ばねの力 Fs (N):
      <input id="fsSlider" type="range" min="0" max="100" step="1" value="20">
      <span id="fsValue">20</span>
    </label>

    <label id="tLabel" class="hidden">
      張力 T (N):
      <input id="tSlider" type="range" min="0" max="100" step="1" value="20">
      <span id="tValue">20</span>
    </label>

    <label id="muLabel" class="hidden">
      摩擦係数 μ:
      <input id="muSlider" type="range" min="0" max="1" step="0.01" value="0.4">
      <span id="muValue">0.40</span>
    </label>

    <label id="thetaLabel" class="hidden">
      糸の角度 θ (°):
      <input id="thetaSlider" type="range" min="0" max="90" step="1" value="30">
      <span id="thetaValue">30</span>
    </label>

    <p id="hint" class="hint">机の上の物体：重力 mg と垂直抗力 N がつり合います。</p>

    <div class="btn-row" id="animBtns">
      <button id="startBtn" type="button">スタート</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div class="sim-layout">
    <section id="calcPanel" aria-label="力の計算">
      <h3 id="sceneTitle">力のベクトル — 机の上</h3>
      <div id="statusPanel" class="balanced">つりあっている</div>
      <p class="concept" id="calcConcept">各力の大きさと合力 F_net を確認できます。</p>
      <div class="calc-block" id="calcLines"></div>
    </section>

    <div class="canvas-section">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="canvas"></canvas>
      </div>
      <p class="canvas-caption" id="canvasCaption">
        <span class="lg-mg">■ mg</span>　<span class="lg-n">■ N</span>　<span class="lg-f">■ F</span>　<span class="lg-net">■ F_net</span> — ベクトルは発光表示
      </p>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const canvasWrap = document.getElementById("canvasWrap");
    const statusPanel = document.getElementById("statusPanel");
    const hintEl = document.getElementById("hint");
    const legendEl = document.getElementById("legend");
    const calcLinesEl = document.getElementById("calcLines");
    const sceneTitleEl = document.getElementById("sceneTitle");
    const canvasCaptionEl = document.getElementById("canvasCaption");
    const tabBtns = document.querySelectorAll(".tab-btn");

    const mSlider = document.getElementById("mSlider");
    const fSlider = document.getElementById("fSlider");
    const fsSlider = document.getElementById("fsSlider");
    const tSlider = document.getElementById("tSlider");
    const muSlider = document.getElementById("muSlider");
    const thetaSlider = document.getElementById("thetaSlider");

    const G = 9.8;
    const FORCE_SCALE = 2.2;
    const ANGLE_FORCE_SCALE = 3.6;
    const BALANCE_EPS = 0.15;
    const MAX_DT = 1 / 30;
    const BREAK_DURATION = 0.55;
    const PIXELS_PER_M = 42;

    const COLORS = {
      mg: "#60a5fa",
      N: "#22d3ee",
      F: "#34d399",
      Ff: "#f87171",
      Fs: "#fb923c",
      T: "#a78bfa",
      net: "#fbbf24",
      accent: "#3b82f6"
    };

    let layout = { w: 0, h: 0, dpr: 1 };
    let activeTab = "table";
    let anim = {
      active: false,
      phase: "idle",
      breakT: 0,
      dx: 0,
      dy: 0,
      vx: 0,
      vy: 0,
      onGround: false
    };

    function isStringTab() {
      return activeTab === "string" || activeTab === "angle";
    }

    const TAB_META = {
      table: {
        scene: "机の上",
        hint: "机の上の物体：重力 mg（下）と垂直抗力 N（上）がつり合います。右向きの外力 F を加えると水平方向が不平衡になります。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-n">■ 垂直抗力 N</span>　<span class="lg-f">■ 外力 F</span>　<span class="lg-net">■ 合力</span>',
        caption: '<span class="lg-mg">■ mg</span>　<span class="lg-n">■ N</span>　<span class="lg-f">■ F</span>　<span class="lg-net">■ F_net</span> — ベクトルは発光表示',
        defaults: { m: 2, F: 0 }
      },
      spring: {
        scene: "ばね",
        hint: "ばねでつるした物体：重力 mg（下）とばねの力 Fs（上）がつり合います。Fs = mg のとき平衡です。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-fs">■ ばねの力 Fs</span>　<span class="lg-net">■ 合力</span>',
        caption: '<span class="lg-mg">■ mg</span>　<span class="lg-fs">■ Fs</span>　<span class="lg-net">■ F_net</span> — ばねのつり合い',
        defaults: { m: 2, Fs: 20 }
      },
      string: {
        scene: "糸",
        hint: "糸でつるした物体：T = mg のときつり合います。スタートで確認 — つり合わないと糸が切れて物体が落ちます。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-t">■ 張力 T</span>　<span class="lg-net">■ 合力</span>',
        caption: '<span class="lg-mg">■ mg</span>　<span class="lg-t">■ T</span>　<span class="lg-net">■ F_net</span> — スタートで糸の切れ方を確認',
        defaults: { m: 2, T: 20 }
      },
      friction: {
        scene: "摩擦",
        hint: "摩擦力：垂直方向は N = mg。水平方向は外力 F と摩擦力 Ff（赤）がつり合います。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-n">■ 垂直抗力 N</span>　<span class="lg-f">■ 外力 F</span>　<span class="lg-ff">■ 摩擦力 Ff</span>　<span class="lg-net">■ 合力</span>',
        caption: '<span class="lg-mg">■ mg</span>　<span class="lg-n">■ N</span>　<span class="lg-f">■ F</span>　<span class="lg-ff">■ Ff</span>　<span class="lg-net">■ F_net</span>',
        defaults: { m: 2, F: 15, mu: 0.4 }
      },
      angle: {
        scene: "角度",
        hint: "糸が角度 θ で張力 T を加えます。スタートで確認 — 合力が 0 でなければ糸が切れます。",
        legend: '<span class="lg-mg">■ 重力 mg</span>　<span class="lg-n">■ 垂直抗力 N</span>　<span class="lg-t">■ 張力 T</span>　<span class="lg-ff">■ 摩擦力 Ff</span>　<span class="lg-net">■ 合力</span>',
        caption: '<span class="lg-mg">■ mg</span>　<span class="lg-t">■ T</span>　<span class="lg-ff">■ Ff</span>　<span class="lg-net">■ F_net</span> — 角度 θ のつり合い',
        defaults: { m: 2, T: 20, mu: 0.4, theta: 30 }
      }
    };

    function fmt(v, d) {
      return Number(v).toFixed(d);
    }

    function syncSliders() {
      document.getElementById("mValue").textContent = fmt(parseFloat(mSlider.value), 1);
      document.getElementById("fValue").textContent = fSlider.value;
      document.getElementById("fsValue").textContent = fsSlider.value;
      document.getElementById("tValue").textContent = tSlider.value;
      document.getElementById("muValue").textContent = fmt(parseFloat(muSlider.value), 2);
      document.getElementById("thetaValue").textContent = thetaSlider.value;
    }

    function updateTabUI() {
      tabBtns.forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === activeTab));
      document.getElementById("fLabel").classList.toggle("hidden", activeTab !== "table" && activeTab !== "friction");
      document.getElementById("fsLabel").classList.toggle("hidden", activeTab !== "spring");
      document.getElementById("tLabel").classList.toggle("hidden", activeTab !== "string" && activeTab !== "angle");
      document.getElementById("muLabel").classList.toggle("hidden", activeTab !== "friction" && activeTab !== "angle");
      document.getElementById("thetaLabel").classList.toggle("hidden", activeTab !== "angle");
      hintEl.textContent = TAB_META[activeTab].hint;
      legendEl.innerHTML = TAB_META[activeTab].legend;
      canvasCaptionEl.innerHTML = TAB_META[activeTab].caption;
      sceneTitleEl.textContent = `力のベクトル — ${TAB_META[activeTab].scene}`;
      document.getElementById("animBtns").style.display = isStringTab() ? "flex" : "none";
    }

    function resetAnimation() {
      anim = { active: false, phase: "idle", breakT: 0, dx: 0, dy: 0, vx: 0, vy: 0, onGround: false };
    }

    function startAnimation() {
      if (!isStringTab()) return;
      if (anim.active && (anim.phase === "break" || anim.phase === "fall")) return;
      const forces = computeForces();
      const balanced = forces.netMag < BALANCE_EPS;
      anim.active = true;
      anim.breakT = 0;
      anim.dx = 0;
      anim.dy = 0;
      anim.vx = 0;
      anim.vy = 0;
      anim.onGround = false;
      anim.phase = balanced ? "hold" : "break";
    }

    function staticFriction(hPull, ffMax) {
      if (hPull > 0.001) return -Math.min(ffMax, hPull);
      if (hPull < -0.001) return Math.min(ffMax, -hPull);
      return 0;
    }

    function computeForces() {
      const m = parseFloat(mSlider.value);
      const mg = m * G;
      const result = {
        tab: activeTab, m, mg,
        N: 0, F: 0, Ff: 0, Fs: 0, T: 0, Tx: 0, Ty: 0,
        netX: 0, netY: 0, netMag: 0,
        lines: []
      };

      if (activeTab === "table") {
        const F = parseFloat(fSlider.value);
        result.N = mg;
        result.F = F;
        result.netX = F;
        result.netY = 0;
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `N  = ${fmt(result.N, 1)} N`,
          `F  = ${fmt(F, 0)} N`
        ];
      } else if (activeTab === "spring") {
        const Fs = parseFloat(fsSlider.value);
        result.Fs = Fs;
        result.netY = Fs - mg;
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `Fs = ${fmt(Fs, 0)} N`
        ];
      } else if (activeTab === "string") {
        const T = parseFloat(tSlider.value);
        result.T = T;
        result.netY = T - mg;
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `T  = ${fmt(T, 0)} N`
        ];
      } else if (activeTab === "friction") {
        const F = parseFloat(fSlider.value);
        const mu = parseFloat(muSlider.value);
        result.N = mg;
        result.F = F;
        result.Ff = staticFriction(F, mu * mg);
        result.netX = F + result.Ff;
        result.netY = 0;
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `N  = ${fmt(result.N, 1)} N`,
          `F  = ${fmt(F, 0)} N`,
          `Ff = ${fmt(result.Ff, 1)} N`
        ];
      } else if (activeTab === "angle") {
        const T = parseFloat(tSlider.value);
        const mu = parseFloat(muSlider.value);
        const theta = parseFloat(thetaSlider.value) * Math.PI / 180;
        result.T = T;
        result.Tx = -T * Math.cos(theta);
        result.Ty = T * Math.sin(theta);
        result.N = Math.max(0, mg - result.Ty);
        result.Ff = staticFriction(result.Tx, mu * result.N);
        result.netX = result.Tx + result.Ff;
        result.netY = result.N + result.Ty - mg;
        result.thetaDeg = parseFloat(thetaSlider.value);
        result.lines = [
          `mg = ${fmt(mg, 1)} N`,
          `N  = ${fmt(result.N, 1)} N`,
          `T  = ${fmt(T, 0)} N  ∠${result.thetaDeg}°`,
          `Ff = ${fmt(result.Ff, 1)} N`
        ];
      }

      result.netMag = Math.sqrt(result.netX * result.netX + result.netY * result.netY);
      result.lines.push(`F_net = ${fmt(result.netMag, 1)} N`);
      return result;
    }

    function resetSimulation() {
      const d = TAB_META[activeTab].defaults;
      mSlider.value = d.m;
      if (d.F !== undefined) fSlider.value = d.F;
      if (d.Fs !== undefined) fsSlider.value = d.Fs;
      if (d.T !== undefined) tSlider.value = d.T;
      if (d.mu !== undefined) muSlider.value = d.mu;
      if (d.theta !== undefined) thetaSlider.value = d.theta;
      syncSliders();
      resetAnimation();
    }

    function setTab(tab) {
      activeTab = tab;
      updateTabUI();
      resetSimulation();
      draw();
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
      const w = Math.max(280, Math.round(rect.width));
      const h = Math.max(240, Math.round(rect.height));
      if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
        canvas.width = Math.round(w * dpr);
        canvas.height = Math.round(h * dpr);
      }
      layout = { w, h, dpr };
    }

    function setupCtx() {
      ctx.setTransform(layout.dpr, 0, 0, layout.dpr, 0, 0);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
    }

    function drawDarkBg(w, h) {
      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, "#0a0e18");
      bg.addColorStop(0.5, "#0f172a");
      bg.addColorStop(1, "#172554");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      const glow = ctx.createRadialGradient(w * 0.5, h * 0.55, 0, w * 0.5, h * 0.55, Math.max(w, h) * 0.55);
      glow.addColorStop(0, "rgba(59, 130, 246, 0.12)");
      glow.addColorStop(0.45, "rgba(96, 165, 250, 0.05)");
      glow.addColorStop(1, "rgba(15, 23, 42, 0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = "rgba(148, 163, 184, 0.06)";
      ctx.lineWidth = 1;
      for (let i = 0; i < w; i += 40) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, h);
        ctx.stroke();
      }
      for (let j = 0; j < h; j += 40) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(w, j);
        ctx.stroke();
      }
    }

    tabBtns.forEach((btn) => btn.addEventListener("click", () => setTab(btn.dataset.tab)));
    [mSlider, fSlider, fsSlider, tSlider, muSlider, thetaSlider].forEach((s) => {
      s.addEventListener("input", syncSliders);
      s.addEventListener("change", syncSliders);
    });
    document.getElementById("startBtn").addEventListener("click", (e) => {
      e.preventDefault();
      startAnimation();
    });
    document.getElementById("resetBtn").addEventListener("click", (e) => {
      e.preventDefault();
      resetSimulation();
    });

    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(resizeCanvas).observe(canvasWrap);
    }

    requestAnimationFrame(() => {
      resizeCanvas();
      updateTabUI();
      resetSimulation();
    });

    function updateAnimation(dt, forces, lay) {
      if (!anim.active) return;

      if (anim.phase === "hold") return;

      if (anim.phase === "break") {
        anim.breakT += dt;
        if (anim.breakT >= BREAK_DURATION) {
          anim.phase = "fall";
          const m = Math.max(forces.m, 0.1);
          if (activeTab === "string") {
            anim.vy = forces.netY > BALANCE_EPS ? -1.5 : 0;
          } else {
            anim.vx = (forces.netX / m) * 0.35;
            anim.vy = -(forces.netY / m) * 0.35;
          }
        }
        return;
      }

      if (anim.phase === "fall") {
        if (!anim.onGround) {
          anim.vy += G * dt;
          if (activeTab === "angle" && Math.abs(anim.vx) > 0.01) {
            anim.vx *= 0.988;
          }
          anim.dx += anim.vx * PIXELS_PER_M * dt;
          anim.dy += anim.vy * PIXELS_PER_M * dt;
          if (anim.dy >= lay.maxDrop) {
            anim.dy = lay.maxDrop;
            anim.vy = 0;
            anim.vx = 0;
            anim.onGround = true;
            anim.phase = "done";
            anim.active = false;
          }
        }
      }
    }

    function drawStringLine(x1, y1, x2, y2, intact, breakT) {
      if (intact) {
        ctx.save();
        ctx.strokeStyle = "#94a3b8";
        ctx.shadowBlur = 6;
        ctx.shadowColor = "rgba(148, 163, 184, 0.5)";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.restore();
        return;
      }

      const progress = Math.min(1, breakT / BREAK_DURATION);
      const midY = y1 + (y2 - y1) * 0.45;
      const gap = 6 + progress * 28;

      ctx.strokeStyle = progress < 0.5 ? "#fb923c" : "#64748b";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1, midY - gap / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x1, midY + gap / 2);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      if (progress > 0.35) {
        ctx.strokeStyle = "#f87171";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 4]);
        [-1, 1].forEach((s) => {
          ctx.beginPath();
          ctx.moveTo(x1 + s * 8, midY);
          ctx.lineTo(x1 + s * (8 + progress * 18), midY + progress * 22);
          ctx.stroke();
        });
        ctx.setLineDash([]);
      }
    }

    function drawAngleString(anchorX, anchorY, attachX, attachY, intact, breakT) {
      if (intact) {
        ctx.save();
        ctx.strokeStyle = "#94a3b8";
        ctx.shadowBlur = 8;
        ctx.shadowColor = "rgba(148, 163, 184, 0.45)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(anchorX, anchorY);
        ctx.lineTo(attachX, attachY);
        ctx.stroke();
        ctx.fillStyle = COLORS.accent;
        ctx.shadowBlur = 12;
        ctx.shadowColor = COLORS.accent;
        ctx.beginPath();
        ctx.arc(anchorX, anchorY, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return;
      }

      const progress = Math.min(1, breakT / BREAK_DURATION);
      const mx = anchorX + (attachX - anchorX) * 0.42;
      const my = anchorY + (attachY - anchorY) * 0.42;
      const gx = (attachX - anchorX) / Math.hypot(attachX - anchorX, attachY - anchorY) || 0;
      const gy = (attachY - anchorY) / Math.hypot(attachX - anchorX, attachY - anchorY) || 0;
      const gap = 8 + progress * 24;

      ctx.strokeStyle = progress < 0.5 ? "#fb923c" : "#64748b";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(anchorX, anchorY);
      ctx.lineTo(mx - gx * gap / 2, my - gy * gap / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx + gx * gap / 2, my + gy * gap / 2);
      ctx.lineTo(attachX, attachY);
      ctx.stroke();
      ctx.fillStyle = COLORS.accent;
      ctx.beginPath();
      ctx.arc(anchorX, anchorY, 7, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawArrow(ox, oy, vx, vy, color, lw, label, opts) {
      const options = opts || {};
      const scale = options.scale ?? FORCE_SCALE;
      const tx = ox + vx * scale;
      const ty = oy - vy * scale;
      const dx = tx - ox;
      const dy = ty - oy;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 2) return;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.shadowBlur = 14;
      ctx.shadowColor = color;

      if (options.dashed) ctx.setLineDash([7, 5]);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.35)";
      ctx.lineWidth = lw + 4;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(tx, ty);
      ctx.stroke();

      ctx.strokeStyle = color;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      ctx.setLineDash([]);

      const head = Math.min(12, len * 0.24);
      const ang = Math.atan2(dy, dx);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - head * Math.cos(ang - Math.PI / 7), ty - head * Math.sin(ang - Math.PI / 7));
      ctx.lineTo(tx - head * Math.cos(ang + Math.PI / 7), ty - head * Math.sin(ang + Math.PI / 7));
      ctx.closePath();
      ctx.fill();

      if (options.showLabel === false) {
        ctx.restore();
        return;
      }

      const lx = tx + (options.lx ?? 6);
      const ly = ty + (options.ly ?? -4);
      ctx.shadowBlur = 0;
      ctx.font = "bold 11px Inter, Poppins, Noto Sans JP, sans-serif";
      if (options.labelBg) {
        const tw = ctx.measureText(label).width + 8;
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.strokeStyle = "rgba(59, 130, 246, 0.25)";
        ctx.lineWidth = 1;
        ctx.fillRect(lx - 4, ly - 12, tw, 16);
        ctx.strokeRect(lx - 4, ly - 12, tw, 16);
      }
      ctx.fillStyle = color;
      ctx.fillText(label, lx, ly);
      ctx.restore();
    }

    function drawSpringCoil(cx, yTop, yBottom) {
      const coils = 7;
      const amp = 22;
      const hookLen = 18;

      const mountGrad = ctx.createLinearGradient(cx - 46, yTop - 10, cx + 46, yTop + 2);
      mountGrad.addColorStop(0, "#334155");
      mountGrad.addColorStop(1, "#475569");
      ctx.fillStyle = mountGrad;
      ctx.fillRect(cx - 46, yTop - 10, 92, 12);
      ctx.strokeStyle = "rgba(59, 130, 246, 0.4)";
      ctx.lineWidth = 2;
      ctx.strokeRect(cx - 46, yTop - 10, 92, 12);

      ctx.strokeStyle = "#64748b";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, yTop + 2);
      ctx.lineTo(cx, yTop + hookLen);
      ctx.stroke();

      const springTop = yTop + hookLen;
      const springBottom = yBottom;
      const steps = coils * 2;
      const dy = (springBottom - springTop) / steps;

      ctx.save();
      ctx.strokeStyle = COLORS.Fs;
      ctx.shadowBlur = 10;
      ctx.shadowColor = COLORS.Fs;
      ctx.lineWidth = 5;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(cx, springTop);
      let y = springTop;
      for (let i = 0; i < steps; i += 1) {
        const x = cx + (i % 2 === 0 ? amp : -amp);
        y += dy;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(cx, springBottom);
      ctx.stroke();
      ctx.restore();

      ctx.strokeStyle = "rgba(251, 146, 60, 0.55)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, springTop);
      y = springTop;
      for (let i = 0; i < steps; i += 1) {
        const x = cx + (i % 2 === 0 ? amp : -amp);
        y += dy;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(cx, springBottom);
      ctx.stroke();
    }

    function drawBlock(cx, cy, bw, bh) {
      const grad = ctx.createLinearGradient(cx - bw / 2, cy - bh / 2, cx + bw / 2, cy + bh / 2);
      grad.addColorStop(0, "#475569");
      grad.addColorStop(0.5, "#64748b");
      grad.addColorStop(1, "#334155");
      ctx.save();
      ctx.shadowBlur = 16;
      ctx.shadowColor = "rgba(59, 130, 246, 0.35)";
      ctx.fillStyle = grad;
      ctx.strokeStyle = COLORS.accent;
      ctx.lineWidth = 2;
      ctx.fillRect(cx - bw / 2, cy - bh / 2, bw, bh);
      ctx.strokeRect(cx - bw / 2, cy - bh / 2, bw, bh);
      ctx.restore();
    }

    function drawGround(groundY, w) {
      ctx.fillStyle = "rgba(18, 24, 36, 0.75)";
      ctx.fillRect(0, groundY, w, layout.h - groundY + 8);

      ctx.strokeStyle = "rgba(59, 130, 246, 0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(36, groundY);
      ctx.lineTo(w - 36, groundY);
      ctx.stroke();

      ctx.fillStyle = "rgba(59, 130, 246, 0.12)";
      for (let i = 36; i < w - 36; i += 18) {
        ctx.fillRect(i, groundY + 2, 2, 10);
      }
    }

    function updateCalcPanel(forces) {
      calcLinesEl.innerHTML = forces.lines.map((line, i) => {
        const isNet = i === forces.lines.length - 1;
        return `<p class="calc-line${isNet ? " net" : ""}">${line}</p>`;
      }).join("");
    }

    function getStringLayout(w, h) {
      const cx = w * 0.5;
      const restCy = h * 0.55;
      const half = 28;
      const groundY = h * 0.86;
      return {
        cx,
        restCy,
        topY: h * 0.1,
        half,
        bw: 56,
        bh: 56,
        groundY,
        maxDrop: Math.max(0, groundY - half - restCy)
      };
    }

    function getAngleLayout(w, h) {
      const groundY = h * 0.78;
      const bw = 96;
      const bh = 64;
      const restCx = w * 0.58;
      const restCy = groundY - bh / 2 - 4;
      return {
        groundY,
        bw,
        bh,
        restCx,
        restCy,
        attachRestX: restCx - bw / 2,
        attachRestY: restCy - bh / 2,
        anchorX: Math.max(50, restCx - 150),
        anchorY: restCy - 110,
        maxDrop: Math.max(0, groundY - bh / 2 - restCy)
      };
    }

    function stringIsIntact() {
      return !anim.active || anim.phase === "idle" || anim.phase === "hold";
    }

    function drawTableScene(forces, w, h) {
      const groundY = h * 0.72;
      const cx = w * 0.5;
      const cy = groundY - 24;
      drawGround(groundY, w);
      drawBlock(cx, cy, 72, 48);
      drawArrow(cx, cy, 0, -forces.mg, COLORS.mg, 3, `mg=${fmt(forces.mg, 1)}N`);
      drawArrow(cx, cy, 0, forces.N, COLORS.N, 3, `N=${fmt(forces.N, 1)}N`);
      if (forces.F > 0.01) drawArrow(cx, cy, forces.F, 0, COLORS.F, 3, `F=${fmt(forces.F, 0)}N`);
      drawArrow(cx, cy, forces.netX, forces.netY, COLORS.net, 3.5, `F_net=${fmt(forces.netMag, 1)}N`);
    }

    function drawSpringScene(forces, w, h) {
      const cx = w * 0.5;
      const blockSize = 72;
      const cy = h * 0.58;
      const topY = h * 0.06;
      const springBottom = cy - blockSize / 2 - 4;

      drawSpringCoil(cx, topY, springBottom);
      drawBlock(cx, cy, blockSize, blockSize);

      const topAttach = cy - blockSize / 2;
      drawArrow(cx, topAttach, 0, forces.Fs, COLORS.Fs, 4,
        `Fs=${fmt(forces.Fs, 0)}N`, { lx: 12, ly: -8, labelBg: true });
      drawArrow(cx, cy, 0, -forces.mg, COLORS.mg, 4,
        `mg=${fmt(forces.mg, 1)}N`, { lx: -72, ly: 8, labelBg: true });
      if (forces.netMag > BALANCE_EPS) {
        drawArrow(cx, cy, 0, forces.netY, COLORS.net, 3,
          `F_net=${fmt(forces.netMag, 1)}N`, { lx: 14, ly: 14, dashed: true, labelBg: true });
      }
    }

    function drawStringScene(forces, w, h) {
      const lay = getStringLayout(w, h);
      const cx = lay.cx + anim.dx;
      const cy = lay.restCy + anim.dy;
      const intact = stringIsIntact();
      const breakT = anim.phase === "break" ? anim.breakT : BREAK_DURATION;

      drawGround(lay.groundY, w);
      ctx.fillStyle = "#475569";
      ctx.strokeStyle = "rgba(59, 130, 246, 0.35)";
      ctx.lineWidth = 1;
      ctx.fillRect(lay.cx - 30, lay.topY - 8, 60, 8);
      ctx.strokeRect(lay.cx - 30, lay.topY - 8, 60, 8);
      drawStringLine(lay.cx, lay.topY, cx, cy - lay.half, intact, breakT);
      drawBlock(cx, cy, lay.bw, lay.bh);

      drawArrow(cx, cy, 0, -forces.mg, COLORS.mg, 3, `mg=${fmt(forces.mg, 1)}N`);
      if (intact) {
        drawArrow(cx, cy, 0, forces.T, COLORS.T, 3, `T=${fmt(forces.T, 0)}N`);
      }
      if ((intact || anim.phase === "break") && forces.netMag > BALANCE_EPS) {
        drawArrow(cx, cy, 0, forces.netY, COLORS.net, 3.5, `F_net=${fmt(forces.netMag, 1)}N`);
      }
      if (!intact && anim.phase !== "break") {
        ctx.fillStyle = "#f87171";
        ctx.font = "bold 13px Inter, Noto Sans JP, sans-serif";
        ctx.textAlign = "center";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#f87171";
        ctx.fillText("糸が切れた！", cx, cy + lay.half + 28);
        ctx.textAlign = "start";
        ctx.shadowBlur = 0;
      }
      return lay;
    }

    function drawFrictionScene(forces, w, h) {
      const groundY = h * 0.72;
      const cx = w * 0.5;
      const cy = groundY - 24;
      drawGround(groundY, w);
      drawBlock(cx, cy, 72, 48);
      drawArrow(cx, cy, 0, -forces.mg, COLORS.mg, 3, `mg=${fmt(forces.mg, 1)}N`);
      drawArrow(cx, cy, 0, forces.N, COLORS.N, 3, `N=${fmt(forces.N, 1)}N`);
      if (forces.F > 0.01) drawArrow(cx, cy, forces.F, 0, COLORS.F, 3, `F=${fmt(forces.F, 0)}N`);
      if (Math.abs(forces.Ff) > 0.01) drawArrow(cx, cy, forces.Ff, 0, COLORS.Ff, 3, `Ff=${fmt(forces.Ff, 1)}N`);
      drawArrow(cx, cy, forces.netX, forces.netY, COLORS.net, 3.5, `F_net=${fmt(forces.netMag, 1)}N`);
    }

    function drawAngleScene(forces, w, h) {
      const lay = getAngleLayout(w, h);
      const cx = lay.restCx + anim.dx;
      const cy = lay.restCy + anim.dy;
      const attachX = lay.attachRestX + anim.dx;
      const attachY = lay.attachRestY + anim.dy;
      const scale = ANGLE_FORCE_SCALE;
      const intact = stringIsIntact();
      const breakT = anim.phase === "break" ? anim.breakT : BREAK_DURATION;

      drawGround(lay.groundY, w);
      drawAngleString(lay.anchorX, lay.anchorY, attachX, attachY, intact, breakT);

      if (intact) {
        const thetaRad = forces.thetaDeg * Math.PI / 180;
        ctx.strokeStyle = "rgba(167, 139, 250, 0.4)";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.arc(attachX, attachY, 36, 0, -thetaRad, true);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = COLORS.T;
        ctx.font = "11px Inter, Poppins, sans-serif";
        ctx.fillText(`θ=${forces.thetaDeg}°`, attachX - 52, attachY - 8);
      }

      drawBlock(cx, cy, lay.bw, lay.bh);
      drawArrow(cx, cy + lay.bh * 0.15, 0, -forces.mg, COLORS.mg, 4,
        `mg=${fmt(forces.mg, 1)}N`, { scale, lx: -88, ly: 10, labelBg: true });

      if (intact) {
        drawArrow(cx, cy - lay.bh * 0.35, 0, forces.N, COLORS.N, 4,
          `N=${fmt(forces.N, 1)}N`, { scale, lx: 10, ly: -14, labelBg: true });
        drawArrow(attachX, attachY, forces.Tx, forces.Ty, COLORS.T, 4,
          `T=${fmt(forces.T, 0)}N`, { scale, lx: -78, ly: -16, labelBg: true });
        if (Math.abs(forces.Ff) > 0.01) {
          drawArrow(cx, cy + lay.bh * 0.35, forces.Ff, 0, COLORS.Ff, 4,
            `Ff=${fmt(forces.Ff, 1)}N`, { scale, lx: -88, ly: 22, labelBg: true });
        }
        if (forces.netMag > BALANCE_EPS) {
          drawArrow(cx + lay.bw * 0.35, cy, forces.netX, forces.netY, COLORS.net, 3.5,
            `F_net=${fmt(forces.netMag, 1)}N`, { scale, lx: 10, ly: 6, dashed: true, labelBg: true });
        }
      } else if (anim.phase === "break" && forces.netMag > BALANCE_EPS) {
        drawArrow(cx + lay.bw * 0.35, cy, forces.netX, forces.netY, COLORS.net, 3.5,
          `F_net=${fmt(forces.netMag, 1)}N`, { scale, lx: 10, ly: 6, dashed: true, labelBg: true });
      } else if (anim.phase !== "break") {
        ctx.fillStyle = "#f87171";
        ctx.font = "bold 13px Inter, Noto Sans JP, sans-serif";
        ctx.textAlign = "center";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#f87171";
        ctx.fillText("糸が切れた！", cx, cy + lay.bh / 2 + 24);
        ctx.textAlign = "start";
        ctx.shadowBlur = 0;
      }
      return lay;
    }

    function updateStatusPanel(forces) {
      const balanced = forces.netMag < BALANCE_EPS;
      if (!isStringTab()) {
        statusPanel.textContent = balanced ? "つりあっている" : "つりあっていない";
        statusPanel.className = balanced ? "balanced" : "unbalanced";
        return;
      }
      if (!anim.active) {
        statusPanel.textContent = balanced
          ? "つりあっている — スタートで確認"
          : "つりあっていない — スタートで糸が切れる";
        statusPanel.className = balanced ? "balanced" : "unbalanced";
        return;
      }
      if (anim.phase === "hold") {
        statusPanel.textContent = "つりあっている — 糸は切れません";
        statusPanel.className = "balanced";
      } else if (anim.phase === "break") {
        statusPanel.textContent = "糸が切れています…";
        statusPanel.className = "broken";
      } else if (anim.phase === "fall") {
        statusPanel.textContent = "糸が切れて物体が動いています";
        statusPanel.className = "broken";
      } else if (anim.phase === "done") {
        statusPanel.textContent = "糸が切れて停止しました — リセットでやり直し";
        statusPanel.className = "broken";
      }
    }

    function draw() {
      resizeCanvas();
      syncSliders();
      setupCtx();
      const forces = computeForces();
      const w = layout.w;
      const h = layout.h;
      ctx.clearRect(0, 0, w, h);
      drawDarkBg(w, h);

      let lay = null;
      if (activeTab === "table") drawTableScene(forces, w, h);
      else if (activeTab === "spring") drawSpringScene(forces, w, h);
      else if (activeTab === "string") lay = drawStringScene(forces, w, h);
      else if (activeTab === "friction") drawFrictionScene(forces, w, h);
      else lay = drawAngleScene(forces, w, h);

      updateCalcPanel(forces);
      updateStatusPanel(forces);
      return lay;
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, MAX_DT);
      last = now;
      const forces = computeForces();
      let lay = null;
      if (isStringTab()) {
        const w = layout.w;
        const h = layout.h;
        lay = activeTab === "string" ? getStringLayout(w, h) : getAngleLayout(w, h);
        updateAnimation(dt, forces, lay);
      }
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
