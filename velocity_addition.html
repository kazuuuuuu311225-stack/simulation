<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>速度の合成シミュレーション — 1章 物体の運動</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(12px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: #4a7099;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: 90%;
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 15px;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 30px;
    }

    .vector-group {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(0, 140, 220, 0.12);
    }

    .vector-title {
      margin: 0 0 8px;
      font-size: 0.88rem;
      font-weight: 600;
    }

    .vector-title.v1 { color: #0088cc; }
    .vector-title.v2 { color: #dd4455; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-row button {
      flex: 1;
      padding: 14px 12px;
      min-height: 48px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #startBtn {
      background: #00aaff;
      color: white;
      box-shadow: 0 0 10px #66d0ff;
    }

    #resetBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }

    canvas {
      display: block;
      width: 95vw;
      max-width: 100%;
      height: 42vh;
      height: 42dvh;
      border-radius: 12px;
      margin-top: 10px;
      background: white;
      touch-action: none;
      box-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
    }

    #formulaPanel {
      width: 90%;
      margin: 12px 0 16px;
      padding: 16px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.12);
      line-height: 1.7;
    }

    #formulaPanel h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      color: #004c99;
    }

    .concept {
      margin: 0 0 14px;
      font-size: 0.92rem;
      color: #4a7099;
    }

    .formula-block {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(0, 140, 220, 0.15);
    }

    .formula-block:last-child {
      margin-bottom: 0;
    }

    .formula-label {
      margin: 0 0 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #2a7fd4;
      letter-spacing: 0.04em;
    }

    .formula-line {
      margin: 4px 0;
      font-size: 0.95rem;
      color: #003366;
    }

    .formula-line.sub {
      margin-left: 0.5rem;
      font-size: 0.88rem;
      color: #4a7099;
    }

    .formula-line .num {
      font-weight: 600;
      color: #0066aa;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>速度の合成シミュレーション</h2>
    <p class="chapter-label">1章　物体の運動</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <div class="vector-group">
      <p class="vector-title v1">速度 v₁（青）</p>
      <label>
        大きさ (m/s):
        <input id="v1MagSlider" type="range" min="0" max="50" step="1" value="20">
        <span id="v1MagValue">20</span>
      </label>
      <label>
        方向 (°):
        <input id="v1DirSlider" type="range" min="0" max="360" step="1" value="30">
        <span id="v1DirValue">30</span>
      </label>
    </div>

    <div class="vector-group">
      <p class="vector-title v2">速度 v₂（赤）</p>
      <label>
        大きさ (m/s):
        <input id="v2MagSlider" type="range" min="0" max="50" step="1" value="15">
        <span id="v2MagValue">15</span>
      </label>
      <label>
        方向 (°):
        <input id="v2DirSlider" type="range" min="0" max="360" step="1" value="120">
        <span id="v2DirValue">120</span>
      </label>
    </div>

    <div class="btn-row">
      <button id="startBtn" type="button">スタート</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <section id="formulaPanel" aria-label="速度の合成">
    <h3>速度の合成（高校物理）</h3>
    <p class="concept">2 つの速度ベクトルをベクトル和で足すと、合成速度 v になります。</p>

    <div class="formula-block">
      <p class="formula-label">① ベクトルの分解</p>
      <p class="formula-line">v₁x = v₁ cosθ₁、v₁y = v₁ sinθ₁</p>
      <p class="formula-line">v₂x = v₂ cosθ₂、v₂y = v₂ sinθ₂</p>
    </div>

    <div class="formula-block">
      <p class="formula-label">② 合成速度</p>
      <p class="formula-line">v<sub>x</sub> = v₁x + v₂x = <span id="fVx" class="num">—</span> m/s</p>
      <p class="formula-line">v<sub>y</sub> = v₁y + v₂y = <span id="fVy" class="num">—</span> m/s</p>
      <p class="formula-line sub">|v| = √(v<sub>x</sub>² + v<sub>y</sub>²) = <span id="fVmag" class="num">—</span> m/s</p>
      <p class="formula-line sub">方向 θ = <span id="fVdir" class="num">—</span>°</p>
    </div>
  </section>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const v1MagSlider = document.getElementById("v1MagSlider");
    const v1DirSlider = document.getElementById("v1DirSlider");
    const v2MagSlider = document.getElementById("v2MagSlider");
    const v2DirSlider = document.getElementById("v2DirSlider");

    const MAX_DT = 1 / 30;
    const MARGIN = 20;
    const VECTOR_SCALE = 2.2;

    let v1Mag = parseFloat(v1MagSlider.value);
    let v1Dir = parseFloat(v1DirSlider.value);
    let v2Mag = parseFloat(v2MagSlider.value);
    let v2Dir = parseFloat(v2DirSlider.value);
    let simV1 = vectorFromPolar(v1Mag, v1Dir);
    let simV2 = vectorFromPolar(v2Mag, v2Dir);
    let posX = 0;
    let posY = 0;
    let t = 0;
    let running = false;

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function vectorFromPolar(mag, deg) {
      const rad = degToRad(deg);
      return {
        x: mag * Math.cos(rad),
        y: mag * Math.sin(rad)
      };
    }

    function addVectors(a, b) {
      return { x: a.x + b.x, y: a.y + b.y };
    }

    function vectorMag(v) {
      return Math.sqrt(v.x * v.x + v.y * v.y);
    }

    function vectorDirDeg(v) {
      let deg = Math.atan2(v.y, v.x) * 180 / Math.PI;
      if (deg < 0) deg += 360;
      return deg;
    }

    function fmt(value, digits) {
      return Number(value).toFixed(digits);
    }

    function syncSliders() {
      v1Mag = parseFloat(v1MagSlider.value);
      v1Dir = parseFloat(v1DirSlider.value);
      v2Mag = parseFloat(v2MagSlider.value);
      v2Dir = parseFloat(v2DirSlider.value);
      document.getElementById("v1MagValue").textContent = v1Mag;
      document.getElementById("v1DirValue").textContent = v1Dir;
      document.getElementById("v2MagValue").textContent = v2Mag;
      document.getElementById("v2DirValue").textContent = v2Dir;
      if (!running) {
        simV1 = vectorFromPolar(v1Mag, v1Dir);
        simV2 = vectorFromPolar(v2Mag, v2Dir);
      }
      updateFormulaPanel();
    }

    function resultantVelocity() {
      return addVectors(simV1, simV2);
    }

    function updateFormulaPanel() {
      const v = resultantVelocity();
      document.getElementById("fVx").textContent = fmt(v.x, 1);
      document.getElementById("fVy").textContent = fmt(v.y, 1);
      document.getElementById("fVmag").textContent = fmt(vectorMag(v), 1);
      document.getElementById("fVdir").textContent = fmt(vectorDirDeg(v), 0);
    }

    function resetSimulation() {
      syncSliders();
      simV1 = vectorFromPolar(v1Mag, v1Dir);
      simV2 = vectorFromPolar(v2Mag, v2Dir);
      posX = 0;
      posY = 0;
      t = 0;
      running = false;
      updateFormulaPanel();
    }

    function startSimulation() {
      syncSliders();
      simV1 = vectorFromPolar(v1Mag, v1Dir);
      simV2 = vectorFromPolar(v2Mag, v2Dir);
      posX = 0;
      posY = 0;
      t = 0;
      running = true;
    }

    function resizeCanvas() {
      const viewport = window.visualViewport;
      const width = viewport ? viewport.width : window.innerWidth;
      const height = viewport ? viewport.height : window.innerHeight;
      canvas.width = Math.max(320, Math.floor(width * 0.95));
      canvas.height = Math.max(260, Math.floor(height * 0.42));
    }

    function bindSlider(slider, onChange) {
      slider.addEventListener("input", onChange);
      slider.addEventListener("change", onChange);
    }

    bindSlider(v1MagSlider, syncSliders);
    bindSlider(v1DirSlider, syncSliders);
    bindSlider(v2MagSlider, syncSliders);
    bindSlider(v2DirSlider, syncSliders);

    startBtn.addEventListener("click", (e) => { e.preventDefault(); startSimulation(); });
    resetBtn.addEventListener("click", (e) => { e.preventDefault(); resetSimulation(); });

    resizeCanvas();
    resetSimulation();
    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resizeCanvas);
    }

    function update(dt) {
      if (!running) return;
      const v = resultantVelocity();
      posX += v.x * dt;
      posY += v.y * dt;
      t += dt;
    }

    function worldToScreen(x, y, centerX, centerY, scale) {
      return {
        x: centerX + x * scale,
        y: centerY - y * scale
      };
    }

    function drawGrid(centerX, centerY, scale) {
      ctx.strokeStyle = "#d0e8ff";
      ctx.lineWidth = 1;
      const spacing = 10;
      const halfW = canvas.width / 2;
      const halfH = canvas.height / 2;

      for (let gx = centerX - halfW; gx <= centerX + halfW; gx += spacing * scale) {
        ctx.beginPath();
        ctx.moveTo(gx, MARGIN);
        ctx.lineTo(gx, canvas.height - MARGIN);
        ctx.stroke();
      }
      for (let gy = centerY - halfH; gy <= centerY + halfH; gy += spacing * scale) {
        ctx.beginPath();
        ctx.moveTo(MARGIN, gy);
        ctx.lineTo(canvas.width - MARGIN, gy);
        ctx.stroke();
      }

      ctx.strokeStyle = "#99ccee";
      ctx.lineWidth = 1.5;
      const origin = worldToScreen(0, 0, centerX, centerY, scale);
      ctx.beginPath();
      ctx.moveTo(origin.x, MARGIN);
      ctx.lineTo(origin.x, canvas.height - MARGIN);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(MARGIN, origin.y);
      ctx.lineTo(canvas.width - MARGIN, origin.y);
      ctx.stroke();
    }

    function drawArrow(fromX, fromY, toX, toY, color, lineWidth) {
      const dx = toX - fromX;
      const dy = toY - fromY;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 2) return;

      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();

      const head = Math.min(12, len * 0.25);
      const angle = Math.atan2(dy, dx);
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(
        toX - head * Math.cos(angle - Math.PI / 7),
        toY - head * Math.sin(angle - Math.PI / 7)
      );
      ctx.lineTo(
        toX - head * Math.cos(angle + Math.PI / 7),
        toY - head * Math.sin(angle + Math.PI / 7)
      );
      ctx.closePath();
      ctx.fill();
    }

    function drawVectorFrom(baseScreen, vec, color, label, lineWidth) {
      const end = {
        x: baseScreen.x + vec.x * VECTOR_SCALE,
        y: baseScreen.y - vec.y * VECTOR_SCALE
      };
      drawArrow(baseScreen.x, baseScreen.y, end.x, end.y, color, lineWidth);
      ctx.fillStyle = color;
      ctx.font = "12px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.fillText(label, end.x + 6, end.y - 4);
    }

    function draw() {
      if (!running) syncSliders();

      const v = resultantVelocity();
      const scale = 1;
      const centerX = canvas.width / 2 - posX * scale;
      const centerY = canvas.height / 2 + posY * scale;
      const obj = worldToScreen(posX, posY, centerX, centerY, scale);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid(centerX, centerY, scale);

      drawVectorFrom(obj, simV1, "#0088dd", "v₁", 3);
      drawVectorFrom(obj, simV2, "#ee4455", "v₂", 3);
      drawVectorFrom(obj, v, "#22bb66", "v", 3.5);

      ctx.strokeStyle = "rgba(34, 187, 102, 0.35)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 5]);
      const v1End = { x: obj.x + simV1.x * VECTOR_SCALE, y: obj.y - simV1.y * VECTOR_SCALE };
      const vEnd = { x: obj.x + v.x * VECTOR_SCALE, y: obj.y - v.y * VECTOR_SCALE };
      ctx.beginPath();
      ctx.moveTo(v1End.x, v1End.y);
      ctx.lineTo(vEnd.x, vEnd.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(obj.x + simV2.x * VECTOR_SCALE, obj.y - simV2.y * VECTOR_SCALE);
      ctx.lineTo(vEnd.x, vEnd.y);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = "#111111";
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#004c99";
      ctx.font = "13px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.fillText(`t = ${fmt(t, 2)} s`, 12, 22);
      ctx.fillText(`v₁ = ${fmt(vectorMag(simV1), 1)} m/s  ∠${fmt(vectorDirDeg(simV1), 0)}°`, 12, 42);
      ctx.fillText(`v₂ = ${fmt(vectorMag(simV2), 1)} m/s  ∠${fmt(vectorDirDeg(simV2), 0)}°`, 12, 62);
      ctx.fillText(`v = ${fmt(vectorMag(v), 1)} m/s  ∠${fmt(vectorDirDeg(v), 0)}°`, 12, 82);

      updateFormulaPanel();
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, MAX_DT);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
