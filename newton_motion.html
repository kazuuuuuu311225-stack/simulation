<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>運動の法則 — 運動方程式</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    h2 { margin-top: 16px; font-weight: 600; color: #004c99; text-shadow: 0 0 8px #aee0ff; }
    .chapter-label { margin: 4px 0 0; font-size: 0.82rem; color: #4a7099; }
    .page-header { display: flex; flex-direction: column; align-items: center; }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: min(520px, 92vw);
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label { font-size: 15px; font-weight: 500; }
    input[type="range"] { width: 100%; height: 30px; accent-color: #00aaff; }
    .hint { margin: 0; font-size: 0.82rem; color: #4a7099; line-height: 1.55; }

    .btn-row { display: flex; gap: 8px; }
    .btn-row button {
      flex: 1;
      padding: 14px 10px;
      min-height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #startBtn { background: #00aaff; color: white; border: none; box-shadow: 0 0 10px #66d0ff; }
    #stopBtn { background: rgba(255,255,255,0.75); color: #cc3355; border: 2px solid rgba(204,51,85,0.35); }
    #stopBtn:disabled { opacity: 0.45; cursor: not-allowed; }
    #resetBtn { background: rgba(255,255,255,0.75); color: #004c99; border: 2px solid rgba(0,170,255,0.35); }

    #statusPanel {
      width: min(520px, 92vw);
      margin: 10px 0 0;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(0, 140, 220, 0.2);
      color: #004c99;
    }

    .canvas-section { width: 95vw; max-width: 640px; margin-top: 8px; }
    .canvas-label { margin: 0 0 4px 4px; font-size: 0.82rem; font-weight: 600; color: #4a7099; }

    .canvas-wrap { width: 100%; position: relative; }
    .canvas-wrap.motion { height: min(300px, 34dvh); min-height: 220px; }
    .canvas-wrap.graph { height: min(220px, 24dvh); min-height: 180px; margin-top: 10px; }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 12px;
      background: white;
      touch-action: none;
      box-shadow: 0 0 14px rgba(0, 150, 255, 0.2);
    }

    .graph-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin: 6px 4px 0;
      font-size: 0.8rem;
      color: #4a7099;
    }
    .graph-legend span { font-weight: 600; }
    .lg-cur { color: #00aaff; }
    .lg-m2 { color: #d4884a; }
    .lg-f2 { color: #e84555; }

    .formula-box {
      width: min(520px, 92vw);
      margin: 10px 0 16px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.45);
      font-size: 0.88rem;
      line-height: 1.75;
      color: #004c99;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>運動の法則</h2>
    <p class="chapter-label">4章　運動の法則 — F = ma</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <label>
      力 F (N):
      <input id="fSlider" type="range" min="1" max="50" step="1" value="12">
      <span id="fValue">12</span>
    </label>
    <label>
      質量 m (kg):
      <input id="mSlider" type="range" min="0.5" max="10" step="0.1" value="2">
      <span id="mValue">2.0</span>
    </label>
    <p class="hint">a = F / m。グラフで「現在の F, m」と「m×2」「F×2」の違いを重ねて比較できます。</p>
    <div class="btn-row">
      <button id="startBtn" type="button">スタート</button>
      <button id="stopBtn" type="button" disabled>停止</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div id="statusPanel">スタートで F = ma の運動とグラフを確認</div>

  <div class="canvas-section">
    <p class="canvas-label">運動の様子</p>
    <div class="canvas-wrap motion" id="motionWrap"><canvas id="motionCanvas"></canvas></div>
    <p class="canvas-label">v–t グラフ（F・m の違いを重ね表示）</p>
    <div class="graph-legend">
      <span class="lg-cur">● 現在（F, m）</span>
      <span class="lg-m2">● 同じ F・m×2（傾き ½）</span>
      <span class="lg-f2">● 同じ m・F×2（傾き 2倍）</span>
    </div>
    <div class="canvas-wrap graph" id="vtWrap"><canvas id="vtCanvas"></canvas></div>
    <p class="canvas-label">x–t グラフ</p>
    <div class="canvas-wrap graph" id="xtWrap"><canvas id="xtCanvas"></canvas></div>
  </div>

  <div class="formula-box">
    第2法則：F = m a　　a = F/m　　v = at　　x = ½at²（初速度 0 から）
  </div>

  <script>
    const motionCanvas = document.getElementById("motionCanvas");
    const xtCanvas = document.getElementById("xtCanvas");
    const vtCanvas = document.getElementById("vtCanvas");
    const motionCtx = motionCanvas.getContext("2d");
    const xtCtx = xtCanvas.getContext("2d");
    const vtCtx = vtCanvas.getContext("2d");
    const motionWrap = document.getElementById("motionWrap");
    const xtWrap = document.getElementById("xtWrap");
    const vtWrap = document.getElementById("vtWrap");
    const statusPanel = document.getElementById("statusPanel");
    const fSlider = document.getElementById("fSlider");
    const mSlider = document.getElementById("mSlider");
    const stopBtn = document.getElementById("stopBtn");

    const MAX_DT = 1 / 30;
    const MARGIN = { left: 44, right: 16, top: 24, bottom: 34 };
    const X_MAX = 12;

    let t = 0;
    let x = 0;
    let v = 0;
    let simF = 12;
    let simM = 2;
    let running = false;
    let stopped = false;
    let xtHistory = [{ t: 0, x: 0 }];
    let vtHistory = [{ t: 0, v: 0 }];

    function fmt(n, d) { return Number(n).toFixed(d); }
    function getF() { return parseFloat(fSlider.value); }
    function getM() { return parseFloat(mSlider.value); }
    function getA() { return getF() / getM(); }

    function syncSliders() {
      document.getElementById("fValue").textContent = fSlider.value;
      document.getElementById("mValue").textContent = fmt(getM(), 1);
      if (!running && !stopped) {
        simF = getF();
        simM = getM();
      }
    }

    function updateButtons() {
      stopBtn.disabled = !running;
    }

    function resetSimulation() {
      fSlider.value = 12;
      mSlider.value = 2;
      syncSliders();
      simF = getF();
      simM = getM();
      t = 0;
      x = 0;
      v = 0;
      running = false;
      stopped = false;
      xtHistory = [{ t: 0, x: 0 }];
      vtHistory = [{ t: 0, v: 0 }];
      updateButtons();
      statusPanel.textContent = "スタートで F = ma の運動とグラフを確認";
    }

    function startSimulation() {
      syncSliders();
      simF = getF();
      simM = getM();
      t = 0;
      x = 0;
      v = 0;
      running = true;
      stopped = false;
      xtHistory = [{ t: 0, x: 0 }];
      vtHistory = [{ t: 0, v: 0 }];
      updateButtons();
    }

    function stopSimulation() {
      if (!running) return;
      running = false;
      stopped = true;
      updateButtons();
      statusPanel.textContent = "停止 — グラフ上の点まで記録済み";
    }

    function resizeOne(canvas, wrap, minH) {
      const rect = wrap.getBoundingClientRect();
      const w = Math.max(280, Math.round(rect.width));
      const h = Math.max(minH, Math.round(rect.height));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    function resizeCanvases() {
      resizeOne(motionCanvas, motionWrap, 220);
      resizeOne(xtCanvas, xtWrap, 180);
      resizeOne(vtCanvas, vtWrap, 180);
    }

    [fSlider, mSlider].forEach((s) => {
      s.addEventListener("input", syncSliders);
      s.addEventListener("change", syncSliders);
    });
    document.getElementById("startBtn").addEventListener("click", (e) => { e.preventDefault(); startSimulation(); });
    stopBtn.addEventListener("click", (e) => { e.preventDefault(); stopSimulation(); });
    document.getElementById("resetBtn").addEventListener("click", (e) => { e.preventDefault(); resetSimulation(); });

    window.addEventListener("resize", resizeCanvases);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvases);
    if (typeof ResizeObserver !== "undefined") {
      [motionWrap, xtWrap, vtWrap].forEach((el) => new ResizeObserver(resizeCanvases).observe(el));
    }
    requestAnimationFrame(() => { resizeCanvases(); resetSimulation(); });

    function update(dt) {
      if (!running) return;
      const a = simF / simM;
      v += a * dt;
      x += v * dt;
      t += dt;
      xtHistory.push({ t, x });
      vtHistory.push({ t, v });
      if (xtHistory.length > 2500) xtHistory.shift();
      if (vtHistory.length > 2500) vtHistory.shift();
      if (x >= X_MAX) {
        x = X_MAX;
        running = false;
        stopped = true;
        updateButtons();
      }
    }

    function niceStep(range, ticks) {
      const rough = range / ticks;
      const pow = Math.pow(10, Math.floor(Math.log10(Math.max(rough, 1e-6))));
      for (const c of [1, 2, 5, 10]) {
        if (c * pow >= rough) return c * pow;
      }
      return pow * 10;
    }

    function formatTick(v) {
      const a = Math.abs(v);
      if (a >= 100) return Math.round(v).toString();
      if (a >= 10) return v.toFixed(0);
      if (a >= 1) return v.toFixed(1);
      return v.toFixed(2);
    }

    function tMaxRange() {
      return Math.max(t, 1.5);
    }

    function xRange(tMax) {
      const a = simF / simM;
      const xEnd = Math.max(x, 0.5 * a * tMax * tMax);
      const xEndM2 = 0.5 * a * 0.5 * tMax * tMax;
      const xEndF2 = 0.5 * a * 2 * tMax * tMax;
      const xMax = Math.max(xEnd, xEndM2, xEndF2, 2);
      return { xMin: 0, xMax: xMax * 1.12 };
    }

    function vRange(tMax) {
      const a = simF / simM;
      const vEnd = a * tMax;
      const vEndM2 = (simF / (simM * 2)) * tMax;
      const vEndF2 = (simF * 2 / simM) * tMax;
      const vMax = Math.max(v, vEnd, vEndM2, vEndF2, 1);
      return { vMin: 0, vMax: vMax * 1.12 };
    }

    function drawReferenceVt(ctx, w, h, tMax, vMin, vMax, tToPx, vToPx) {
      const a = simF / simM;
      const refs = [
        { aMult: 0.5, color: "rgba(212, 136, 74, 0.7)", label: "m×2" },
        { aMult: 2, color: "rgba(232, 69, 85, 0.65)", label: "F×2" }
      ];
      refs.forEach((ref) => {
        ctx.strokeStyle = ref.color;
        ctx.lineWidth = 2;
        ctx.setLineDash([7, 5]);
        ctx.beginPath();
        for (let i = 0; i <= 40; i += 1) {
          const time = (tMax * i) / 40;
          const vv = a * ref.aMult * time;
          const px = tToPx(time);
          const py = vToPx(vv);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    function drawReferenceXt(ctx, w, h, tMax, xMin, xMax, tToPx, xToPx) {
      const a = simF / simM;
      [0.5, 2].forEach((mult) => {
        ctx.strokeStyle = mult < 1 ? "rgba(212, 136, 74, 0.65)" : "rgba(232, 69, 85, 0.6)";
        ctx.lineWidth = 2;
        ctx.setLineDash([7, 5]);
        ctx.beginPath();
        for (let i = 0; i <= 40; i += 1) {
          const time = (tMax * i) / 40;
          const xx = 0.5 * a * mult * time * time;
          const px = tToPx(time);
          const py = xToPx(xx);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    function drawAxisGrid(ctx, w, h, tMax, yMin, yMax, yToPx, yLabel) {
      ctx.strokeStyle = "#e8f2fa";
      ctx.lineWidth = 1;
      const yStep = niceStep(yMax - yMin, 4);
      for (let val = 0; val <= yMax + yStep * 0.01; val += yStep) {
        const py = yToPx(val);
        ctx.beginPath();
        ctx.moveTo(MARGIN.left, py);
        ctx.lineTo(w - MARGIN.right, py);
        ctx.stroke();
      }
      const tStep = niceStep(tMax, 5);
      ctx.strokeStyle = "#d0e8ff";
      for (let time = 0; time <= tMax + tStep * 0.01; time += tStep) {
        const px = MARGIN.left + (time / tMax) * (w - MARGIN.left - MARGIN.right);
        ctx.beginPath();
        ctx.moveTo(px, MARGIN.top);
        ctx.lineTo(px, h - MARGIN.bottom);
        ctx.stroke();
      }
      ctx.strokeStyle = "#aacce0";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(MARGIN.left, MARGIN.top);
      ctx.lineTo(MARGIN.left, h - MARGIN.bottom);
      ctx.lineTo(w - MARGIN.right, h - MARGIN.bottom);
      ctx.stroke();
      ctx.fillStyle = "#5a7a99";
      ctx.font = "10px Inter, Poppins, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("t (s)", w - MARGIN.right - 20, h - 8);
      ctx.save();
      ctx.translate(14, MARGIN.top + 8);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = "left";
      ctx.fillText(yLabel, 0, 0);
      ctx.restore();
      ctx.textAlign = "start";
    }

    function drawMotion() {
      const ctx = motionCtx;
      const w = motionCanvas.width;
      const h = motionCanvas.height;
      const a = simF / simM;
      const groundY = h * 0.72;
      const pad = 40;
      const cx = pad + (x / X_MAX) * (w - pad * 2);
      const cy = groundY - 26;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#f8fcff";
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = "#8bc98a";
      ctx.fillRect(0, groundY, w, h - groundY);
      ctx.strokeStyle = "#5a9a55";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(20, groundY);
      ctx.lineTo(w - 20, groundY);
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.strokeStyle = "#4488bb";
      ctx.lineWidth = 2;
      ctx.fillRect(cx - 34, cy - 22, 68, 44);
      ctx.strokeRect(cx - 34, cy - 22, 68, 44);

      const fLen = Math.min(55, simF * 1.1);
      ctx.strokeStyle = "#22aa55";
      ctx.fillStyle = "#22aa55";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx + 34, cy);
      ctx.lineTo(cx + 34 + fLen, cy);
      ctx.stroke();
      ctx.font = "bold 11px Inter, Noto Sans JP, sans-serif";
      ctx.fillText(`F=${fmt(simF, 0)}N`, cx + 38 + fLen, cy - 6);

      if (v > 0.05) {
        const vLen = Math.min(60, v * 8);
        ctx.strokeStyle = "#0088dd";
        ctx.fillStyle = "#0088dd";
        ctx.beginPath();
        ctx.moveTo(cx, cy - 30);
        ctx.lineTo(cx + vLen, cy - 30);
        ctx.stroke();
        ctx.fillText(`v=${fmt(v, 2)}`, cx + vLen + 4, cy - 26);
      }

      ctx.fillStyle = "rgba(255,255,255,0.94)";
      ctx.fillRect(10, 10, 168, 92);
      ctx.strokeStyle = "rgba(0,76,153,0.12)";
      ctx.strokeRect(10, 10, 168, 92);
      ctx.fillStyle = "#004c99";
      ctx.font = "600 12px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.fillText(`F = ${fmt(simF, 0)} N　m = ${fmt(simM, 1)} kg`, 18, 30);
      ctx.fillText(`a = F/m = ${fmt(a, 2)} m/s²`, 18, 50);
      ctx.fillText(`v = ${fmt(v, 2)} m/s`, 18, 70);
      ctx.fillText(`x = ${fmt(x, 2)} m　t = ${fmt(t, 2)} s`, 18, 90);

      if (running) {
        statusPanel.textContent = `a = ${fmt(a, 2)} m/s² で加速中（F = ma）`;
      }
    }

    function drawXtGraph() {
      const ctx = xtCtx;
      const w = xtCanvas.width;
      const h = xtCanvas.height;
      const tMax = tMaxRange();
      const { xMin, xMax } = xRange(tMax);
      const plotW = w - MARGIN.left - MARGIN.right;
      const plotH = h - MARGIN.top - MARGIN.bottom;
      const tToPx = (time) => MARGIN.left + (time / tMax) * plotW;
      const xToPx = (val) => MARGIN.top + plotH * ((xMax - val) / (xMax - xMin));

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      drawAxisGrid(ctx, w, h, tMax, xMin, xMax, xToPx, "x (m)");
      drawReferenceXt(ctx, w, h, tMax, xMin, xMax, tToPx, xToPx);

      ctx.strokeStyle = "#00aaff";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      xtHistory.forEach((p, i) => {
        const px = tToPx(p.t);
        const py = xToPx(p.x);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();

      if (xtHistory.length) {
        const last = xtHistory[xtHistory.length - 1];
        ctx.fillStyle = "#00aaff";
        ctx.beginPath();
        ctx.arc(tToPx(last.t), xToPx(last.x), 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawVtGraph() {
      const ctx = vtCtx;
      const w = vtCanvas.width;
      const h = vtCanvas.height;
      const tMax = tMaxRange();
      const { vMin, vMax } = vRange(tMax);
      const plotW = w - MARGIN.left - MARGIN.right;
      const plotH = h - MARGIN.top - MARGIN.bottom;
      const tToPx = (time) => MARGIN.left + (time / tMax) * plotW;
      const vToPx = (val) => MARGIN.top + plotH * ((vMax - val) / (vMax - vMin));

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      drawAxisGrid(ctx, w, h, tMax, vMin, vMax, vToPx, "v (m/s)");
      drawReferenceVt(ctx, w, h, tMax, vMin, vMax, tToPx, vToPx);

      ctx.strokeStyle = "#00aaff";
      ctx.lineWidth = 2.8;
      ctx.beginPath();
      vtHistory.forEach((p, i) => {
        const px = tToPx(p.t);
        const py = vToPx(p.v);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();

      if (vtHistory.length) {
        const last = vtHistory[vtHistory.length - 1];
        ctx.fillStyle = "#00aaff";
        ctx.beginPath();
        ctx.arc(tToPx(last.t), vToPx(last.v), 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function draw() {
      if (!running) syncSliders();
      drawMotion();
      drawXtGraph();
      drawVtGraph();
    }

    let last = performance.now();
    function loop(now) {
      update(Math.min((now - last) / 1000, MAX_DT));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
