<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>運動エネルギー — 仕事とエネルギー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      min-height: 100dvh;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: #4a7099;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: min(520px, 92vw);
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 15px;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 30px;
    }

    .hint {
      margin: 0;
      font-size: 0.82rem;
      color: #4a7099;
      line-height: 1.55;
    }

    .formula-box {
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0, 140, 220, 0.08);
      font-size: 0.88rem;
      font-weight: 600;
      color: #004c99;
      text-align: center;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-row button {
      flex: 1 1 calc(33% - 8px);
      min-width: 88px;
      padding: 14px 10px;
      min-height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #startBtn {
      background: #00aaff;
      color: white;
      border: none;
      box-shadow: 0 0 10px #66d0ff;
    }

    #pauseBtn,
    #resetBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }

    #statusPanel {
      width: min(520px, 92vw);
      margin: 10px 0 0;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(0, 140, 220, 0.2);
      color: #004c99;
    }

    #statusPanel.k-low { color: #4a7099; border-color: rgba(74, 112, 153, 0.25); }
    #statusPanel.k-mid { color: #0088dd; border-color: rgba(0, 136, 221, 0.28); }
    #statusPanel.k-high { color: #0066bb; border-color: rgba(0, 102, 187, 0.35); }

    .canvas-section {
      width: 95vw;
      max-width: 640px;
      margin-top: 8px;
    }

    .canvas-wrap {
      width: 100%;
      height: min(400px, 50dvh);
      min-height: 280px;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 12px;
      background: white;
      touch-action: none;
      box-shadow: 0 0 16px rgba(0, 150, 255, 0.25);
    }

    .legend {
      width: min(520px, 92vw);
      margin: 10px 0 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.45);
      font-size: 0.82rem;
      line-height: 1.8;
      color: #4a7099;
    }

    .legend span { font-weight: 600; }
    .lg-v { color: #22aa55; }
    .lg-k { color: #0088dd; }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>運動エネルギー</h2>
    <p class="chapter-label">6章　仕事とエネルギー — K = ½mv²</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <label>
      質量 m (kg):
      <input id="mSlider" type="range" min="1" max="20" step="0.5" value="5">
      <span id="mValue">5.0</span>
    </label>

    <label>
      速度 v (m/s):
      <input id="vSlider" type="range" min="0" max="20" step="0.5" value="6">
      <span id="vValue">6.0</span>
    </label>

    <p class="formula-box">K = ½ m v²　　x = x + v Δt</p>

    <p class="hint">
      速度 v を 2 倍にすると K は 4 倍になります（v² に比例）。
      質量 m を大きくすると、同じ v でも K は大きくなります。
    </p>

    <div class="btn-row">
      <button id="startBtn" type="button">スタート</button>
      <button id="pauseBtn" type="button">停止</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div id="statusPanel">スタートで運動を開始</div>

  <div class="canvas-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div class="legend">
    <span class="lg-v">→ 緑：速度 v</span>　
    <span class="lg-k">■ 青：運動エネルギー K の大きさ</span>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const canvasWrap = document.getElementById("canvasWrap");
    const statusPanel = document.getElementById("statusPanel");
    const mSlider = document.getElementById("mSlider");
    const vSlider = document.getElementById("vSlider");

    const MAX_DT = 1 / 30;
    const X_MIN = -10;
    const X_MAX = 10;
    const X0 = 0;
    const K_MAX = 0.5 * 20 * 20 * 20;
    const K_LOW = 200;
    const K_HIGH = 2000;

    let x = X0;
    let dir = 1;
    let running = false;
    let paused = false;

    const DEFAULTS = { m: 5, v: 6 };

    function fmt(n, d) {
      return Number(n).toFixed(d);
    }

    function getM() {
      return parseFloat(mSlider.value);
    }

    function getV() {
      return parseFloat(vSlider.value);
    }

    function getK() {
      const v = getV();
      return 0.5 * getM() * v * v;
    }

    function kTier(k) {
      if (k < K_LOW) return "low";
      if (k < K_HIGH) return "mid";
      return "high";
    }

    function syncSliders() {
      document.getElementById("mValue").textContent = fmt(getM(), 1);
      document.getElementById("vValue").textContent = fmt(getV(), 1);
    }

    function resetSimulation() {
      mSlider.value = DEFAULTS.m;
      vSlider.value = DEFAULTS.v;
      x = X0;
      dir = 1;
      running = false;
      paused = false;
      syncSliders();
      statusPanel.textContent = "スタートで運動を開始";
      statusPanel.className = "";
    }

    function startSimulation() {
      if (!running) {
        x = X0;
        dir = 1;
      }
      running = true;
      paused = false;
      syncSliders();
    }

    function pauseSimulation() {
      if (!running) return;
      paused = !paused;
      statusPanel.textContent = paused ? "一時停止中" : "運動中";
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const w = Math.max(280, Math.round(rect.width));
      const h = Math.max(220, Math.round(rect.height));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    [mSlider, vSlider].forEach((s) => {
      s.addEventListener("input", syncSliders);
      s.addEventListener("change", syncSliders);
    });

    document.getElementById("startBtn").addEventListener("click", (e) => {
      e.preventDefault();
      startSimulation();
    });

    document.getElementById("pauseBtn").addEventListener("click", (e) => {
      e.preventDefault();
      pauseSimulation();
    });

    document.getElementById("resetBtn").addEventListener("click", (e) => {
      e.preventDefault();
      resetSimulation();
    });

    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(resizeCanvas).observe(canvasWrap);
    }

    requestAnimationFrame(() => {
      resizeCanvas();
      resetSimulation();
    });

    function update(dt) {
      if (!running || paused) return;
      const v = getV();
      if (v < 0.01) return;
      x += dir * v * dt;
      if (x <= X_MIN) {
        x = X_MIN;
        dir = 1;
      } else if (x >= X_MAX) {
        x = X_MAX;
        dir = -1;
      }
    }

    function worldToScreen(posX, w) {
      const pad = 44;
      const trackW = w - pad * 2;
      const t = (posX - X_MIN) / (X_MAX - X_MIN);
      return pad + t * trackW;
    }

    function drawBox(cx, cy, glowAlpha) {
      const bw = 68;
      const bh = 44;

      if (glowAlpha > 0.04) {
        ctx.fillStyle = `rgba(0, 136, 221, ${glowAlpha})`;
        ctx.fillRect(cx - bw / 2 - 8, cy - bh - 8, bw + 16, bh + 16);
      }

      ctx.fillStyle = "#ddeeff";
      ctx.strokeStyle = "#4488bb";
      ctx.lineWidth = 2.5;
      ctx.fillRect(cx - bw / 2, cy - bh, bw, bh);
      ctx.strokeRect(cx - bw / 2, cy - bh, bw, bh);

      ctx.strokeStyle = "#6699bb";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - bw / 2 + 10, cy - bh + 8);
      ctx.lineTo(cx + bw / 2 - 10, cy - bh + 8);
      ctx.stroke();

      ctx.fillStyle = "#556677";
      const wheelY = cy - 2;
      [-20, 20].forEach((dx) => {
        ctx.beginPath();
        ctx.arc(cx + dx, wheelY, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#334455";
        ctx.lineWidth = 2;
        ctx.stroke();
      });
    }

    function drawArrowFrom(x0, y0, dx, dy, color, lw) {
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 3) return;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x0 + dx, y0 + dy);
      ctx.stroke();
      const ang = Math.atan2(dy, dx);
      const head = Math.min(12, len * 0.28);
      const tx = x0 + dx;
      const ty = y0 + dy;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - head * Math.cos(ang - Math.PI / 7), ty - head * Math.sin(ang - Math.PI / 7));
      ctx.lineTo(tx - head * Math.cos(ang + Math.PI / 7), ty - head * Math.sin(ang + Math.PI / 7));
      ctx.closePath();
      ctx.fill();
    }

    function drawTrack(w, groundY) {
      ctx.fillStyle = "#eef6ff";
      ctx.fillRect(0, groundY - 8, w, canvas.height - groundY + 8);
      ctx.strokeStyle = "#aacce8";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(24, groundY);
      ctx.lineTo(w - 24, groundY);
      ctx.stroke();

      ctx.fillStyle = "rgba(0, 76, 153, 0.08)";
      for (let i = 0; i <= 10; i += 1) {
        const wx = X_MIN + (X_MAX - X_MIN) * (i / 10);
        const sx = worldToScreen(wx, w);
        ctx.fillRect(sx - 1, groundY - 20, 2, 20);
      }

      ctx.fillStyle = "#7a9fbf";
      ctx.font = "10px Inter, Poppins, sans-serif";
      ctx.fillText(`${X_MIN} m`, 28, groundY + 18);
      ctx.textAlign = "right";
      ctx.fillText(`${X_MAX} m`, w - 28, groundY + 18);
      ctx.textAlign = "start";
    }

    function drawEnergyBar(w, groundY, k) {
      const barW = Math.min(260, w * 0.62);
      const barH = 14;
      const bx = (w - barW) / 2;
      const by = groundY + 36;
      const fill = Math.min(1, k / K_MAX);

      ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
      ctx.fillRect(bx - 12, by - 26, barW + 24, 48);
      ctx.strokeStyle = "rgba(0, 76, 153, 0.12)";
      ctx.strokeRect(bx - 12, by - 26, barW + 24, 48);

      ctx.fillStyle = "rgba(0, 76, 153, 0.1)";
      ctx.fillRect(bx, by, barW, barH);
      ctx.fillStyle = "#0088dd";
      ctx.fillRect(bx, by, barW * fill, barH);

      ctx.fillStyle = "#004c99";
      ctx.font = "600 14px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(`運動エネルギー K = ${fmt(k, 0)} J`, w / 2, by - 8);
      ctx.font = "11px Inter, Noto Sans JP, sans-serif";
      ctx.fillStyle = "#5a7a99";
      ctx.fillText("K ∝ v²（速度を2倍 → Kは4倍）", w / 2, by + 28);
      ctx.textAlign = "start";
    }

    function drawHud(m, v, k) {
      ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
      ctx.fillRect(12, 12, 168, 72);
      ctx.strokeStyle = "rgba(0, 76, 153, 0.15)";
      ctx.lineWidth = 1;
      ctx.strokeRect(12, 12, 168, 72);

      ctx.font = "600 13px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.fillStyle = "#004c99";
      ctx.fillText(`m = ${fmt(m, 1)} kg`, 22, 34);
      ctx.fillText(`v = ${fmt(v, 1)} m/s`, 22, 54);
      ctx.fillStyle = "#0088dd";
      ctx.fillText(`K = ${fmt(k, 0)} J`, 22, 74);
    }

    function updateStatus(k, v) {
      if (!running) return;
      if (paused) {
        statusPanel.className = "";
        return;
      }
      if (v < 0.1) {
        statusPanel.textContent = "v ≈ 0 → 運動エネルギー K ≈ 0";
        statusPanel.className = "k-low";
        return;
      }
      const tier = kTier(k);
      const msgs = {
        low: "K はまだ小さい — v を上げると K は v² に比例して急に大きくなる",
        mid: "K が中程度 — v を 2 倍にすると K は 4 倍になる",
        high: "K が大きい — 速く動くほど運動エネルギーは大きい"
      };
      statusPanel.textContent = msgs[tier];
      statusPanel.className = `k-${tier}`;
    }

    function draw() {
      syncSliders();
      const w = canvas.width;
      const h = canvas.height;
      const m = getM();
      const v = getV();
      const k = getK();
      const groundY = h * 0.62;
      const cx = worldToScreen(x, w);
      const cy = groundY - 30;
      const glowAlpha = Math.min(0.35, k / K_MAX);

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#f8fcff";
      ctx.fillRect(0, 0, w, h);

      drawTrack(w, groundY);
      drawBox(cx, cy, glowAlpha);

      if (v > 0.05) {
        const arrowDir = running && !paused ? dir : 1;
        const vLen = Math.min(100, v * 4.5) * arrowDir;
        drawArrowFrom(cx, cy - 52, vLen, 0, "#22aa55", 3);
        ctx.fillStyle = "#22aa55";
        ctx.font = "bold 11px Inter, Noto Sans JP, sans-serif";
        const labelX = arrowDir > 0 ? cx + Math.abs(vLen) + 4 : cx + vLen - 48;
        ctx.fillText(`v=${fmt(v, 1)}`, labelX, cy - 48);
      }

      drawHud(m, v, k);
      drawEnergyBar(w, groundY, k);
      updateStatus(k, v);
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, MAX_DT);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
