<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>角度とラジアン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(160deg, #0c1018 0%, #151b28 45%, #1a2030 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e8edf5;
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      min-height: 100dvh;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: #e8edf5;
      text-shadow: 0 0 20px rgba(167, 139, 250, 0.4);
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: #9aa8bc;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: rgba(167, 139, 250, 0.22);
      color: #ede9fe;
      border: 1px solid rgba(167, 139, 250, 0.4);
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: min(520px, 92vw);
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(18, 24, 36, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: #b8c4d4;
    }

    input[type="range"] {
      width: 100%;
      height: 30px;
      accent-color: #a78bfa;
    }

    .formula-box {
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(167, 139, 250, 0.12);
      font-size: 0.88rem;
      font-weight: 600;
      color: #c4b5fd;
      text-align: center;
      line-height: 1.6;
    }

    .hint {
      margin: 0;
      font-size: 0.82rem;
      color: #9aa8bc;
      line-height: 1.55;
    }

    .hint strong { color: #fbbf24; }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-row button {
      flex: 1;
      min-width: 120px;
      padding: 14px 10px;
      min-height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #animBtn {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: white;
      border: none;
      box-shadow: 0 0 16px rgba(167, 139, 250, 0.35);
    }

    #resetBtn {
      background: rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
      border: 2px solid rgba(148, 163, 184, 0.28);
    }

    .canvas-section {
      width: min(640px, 95vw);
      margin-top: 8px;
    }

    .canvas-wrap {
      width: 100%;
      height: min(420px, 52dvh);
      min-height: 280px;
    }

    .canvas-caption {
      margin: 8px 0 0;
      font-size: 0.78rem;
      color: #7a8799;
      text-align: center;
    }

    #liveReadout {
      width: 100%;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(18, 24, 36, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.2);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      align-items: start;
    }

    #liveReadout.near-one {
      border-color: rgba(251, 113, 133, 0.45);
      box-shadow: 0 0 20px rgba(251, 113, 133, 0.12);
    }

    .live-col {
      font-size: 0.84rem;
      line-height: 1.65;
    }

    .live-col.angle { color: #a78bfa; }
    .live-col.arc { color: #7dd3fc; }

    .live-col .title {
      display: block;
      font-weight: 700;
      font-size: 0.78rem;
      margin-bottom: 4px;
      opacity: 0.9;
    }

    .live-col .value {
      display: block;
    }

    #liveOneRad {
      grid-column: 1 / -1;
      text-align: center;
      font-weight: 700;
      font-size: 0.92rem;
      color: #fb7185;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      display: none;
    }

    #liveReadout.near-one #liveOneRad {
      display: block;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 14px;
      background: transparent;
      touch-action: none;
      box-shadow: 0 0 32px rgba(167, 139, 250, 0.12);
    }

    .legend {
      width: min(640px, 95vw);
      margin: 10px 0 16px;
      padding: 12px 14px;
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(18, 24, 36, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.18);
      font-size: 0.82rem;
      line-height: 1.8;
      color: #9aa8bc;
    }

    .legend span { font-weight: 600; }
    .legend-cyan { color: #38bdf8; }
    .legend-amber { color: #fbbf24; }
    .legend-rose { color: #fb7185; }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>角度とラジアン</h2>
    <p class="chapter-label">8章　等速円運動 — 弧度法</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <label>
      半径 r (px):
      <input id="rSlider" type="range" min="50" max="200" step="1" value="120">
      <span id="rValue">120</span>
    </label>
    <label>
      角度 θ (°):
      <input id="thetaSlider" type="range" min="0" max="360" step="0.5" value="57.3">
      <span id="thetaValue">57.3</span>
    </label>

    <p class="formula-box">θ(rad) = θ(°) × π/180　　s = r × θ(rad)</p>
    <p class="hint">弧の長さ s が半径 r と等しくなる角度が <strong>1 rad ≈ 57.3°</strong> です。</p>

    <div class="btn-row">
      <button id="animBtn" type="button">アニメーション</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div class="canvas-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
    <p class="canvas-caption">図は円・弧・基準線のみ。θ・s・r の数値は下のパネルで確認できます。</p>
    <div id="liveReadout" aria-live="polite">
      <div class="live-col angle">
        <span class="title">角度</span>
        <span class="value" id="liveThetaDeg">θ = 57.3 °</span>
        <span class="value" id="liveThetaRad">θ = 1.0000 rad</span>
      </div>
      <div class="live-col arc">
        <span class="title">弧と半径</span>
        <span class="value" id="liveR">r = 120 px</span>
        <span class="value" id="liveS">s = 68.7 px</span>
      </div>
      <span id="liveOneRad">★ ここが 1 rad — s = r ★</span>
    </div>
  </div>

  <div class="legend">
    <span class="legend-cyan">■ シアン：弧 s</span>　
    <span class="legend-amber">■ アンバー：1 rad の位置（≈57.3°）</span>　
    <span class="legend-rose">■ ローズ：1 rad 付近のハイライト</span>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const canvasWrap = document.getElementById("canvasWrap");
    const animBtn = document.getElementById("animBtn");
    const liveReadout = document.getElementById("liveReadout");

    const ONE_RAD_DEG = 180 / Math.PI;
    const ONE_RAD_HIGHLIGHT = 2.5;
    const MAX_DT = 1 / 30;
    const ANIM_SPEED = 45;

    const DEFAULTS = { r: 120, theta: 57.3 };

    const COL = {
      arc: "#38bdf8",
      oneRad: "#fbbf24",
      near: "#fb7185",
      circle: "rgba(167, 139, 250, 0.45)",
      axis: "rgba(148, 163, 184, 0.55)",
    };

    let rPx = DEFAULTS.r;
    let thetaDeg = DEFAULTS.theta;
    let animating = false;
    let layout = { w: 0, h: 0, dpr: 1 };

    function fmt(n, d) { return Number(n).toFixed(d); }

    function getR() { return parseFloat(document.getElementById("rSlider").value); }
    function getThetaDeg() {
      return animating ? thetaDeg : parseFloat(document.getElementById("thetaSlider").value);
    }

    function degToRad(deg) { return deg * Math.PI / 180; }

    function isNearOneRad(deg) {
      return Math.abs(deg - ONE_RAD_DEG) <= ONE_RAD_HIGHLIGHT;
    }

    function updateLiveReadout() {
      const r = getR();
      const thetaD = getThetaDeg();
      const thetaR = degToRad(thetaD);
      const s = r * thetaR;
      const nearOne = isNearOneRad(thetaD);

      document.getElementById("liveThetaDeg").textContent = `θ = ${fmt(thetaD, 1)} °`;
      document.getElementById("liveThetaRad").textContent = `θ = ${fmt(thetaR, 4)} rad`;
      document.getElementById("liveR").textContent = `r = ${fmt(r, 0)} px`;
      document.getElementById("liveS").textContent = `s = ${fmt(s, 1)} px`;
      liveReadout.classList.toggle("near-one", nearOne);
    }

    function syncSliders() {
      document.getElementById("rValue").textContent = fmt(getR(), 0);
      document.getElementById("thetaValue").textContent = fmt(getThetaDeg(), 1);
      updateLiveReadout();
    }

    function resetSimulation() {
      animating = false;
      thetaDeg = DEFAULTS.theta;
      document.getElementById("rSlider").value = DEFAULTS.r;
      document.getElementById("thetaSlider").value = DEFAULTS.theta;
      document.getElementById("thetaSlider").disabled = false;
      document.getElementById("rSlider").disabled = false;
      animBtn.textContent = "アニメーション";
      syncSliders();
    }

    function toggleAnimation() {
      if (animating) {
        animating = false;
        document.getElementById("thetaSlider").disabled = false;
        document.getElementById("rSlider").disabled = false;
        animBtn.textContent = "アニメーション";
        document.getElementById("thetaSlider").value = thetaDeg;
        syncSliders();
        return;
      }
      animating = true;
      thetaDeg = 0;
      document.getElementById("thetaSlider").disabled = true;
      document.getElementById("rSlider").disabled = true;
      animBtn.textContent = "停止";
    }

    function update(dt) {
      if (!animating) return;
      thetaDeg += ANIM_SPEED * dt;
      if (thetaDeg >= 360) thetaDeg -= 360;
      syncSliders();
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
      const w = Math.max(280, Math.round(rect.width));
      const h = Math.max(240, Math.round(rect.height));
      if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
        canvas.width = Math.round(w * dpr);
        canvas.height = Math.round(h * dpr);
      }
      layout = { w, h, dpr };
    }

    function setupCtx() {
      ctx.setTransform(layout.dpr, 0, 0, layout.dpr, 0, 0);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
    }

    function drawDarkBg(w, h) {
      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, "#0a0e14");
      bg.addColorStop(0.55, "#121824");
      bg.addColorStop(1, "#181e2c");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
      const glow = ctx.createRadialGradient(w * 0.5, h * 0.45, 0, w * 0.5, h * 0.5, w * 0.55);
      glow.addColorStop(0, "rgba(167, 139, 250, 0.1)");
      glow.addColorStop(1, "rgba(20, 24, 36, 0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);
    }

    function draw() {
      resizeCanvas();
      setupCtx();

      const w = layout.w;
      const h = layout.h;
      const r = getR();
      const thetaD = getThetaDeg();
      const thetaR = degToRad(thetaD);
      const nearOne = isNearOneRad(thetaD);

      const cx = w * 0.5;
      const cy = h * 0.52;
      const maxR = Math.min(w, h) * 0.38;
      const drawR = Math.min(r, maxR);

      drawDarkBg(w, h);

      ctx.strokeStyle = "rgba(148, 163, 184, 0.06)";
      ctx.lineWidth = 1;
      for (let i = 0; i < w; i += 40) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, h);
        ctx.stroke();
      }
      for (let j = 0; j < h; j += 40) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(w, j);
        ctx.stroke();
      }

      ctx.save();
      ctx.shadowColor = "rgba(167, 139, 250, 0.5)";
      ctx.shadowBlur = 14;
      ctx.strokeStyle = COL.circle;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, drawR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      const oneRadAng = -Math.PI / 2 + degToRad(ONE_RAD_DEG);
      const ox = cx + drawR * Math.cos(-Math.PI / 2);
      const oy = cy + drawR * Math.sin(-Math.PI / 2);
      const oneX = cx + drawR * Math.cos(oneRadAng);
      const oneY = cy + drawR * Math.sin(oneRadAng);

      ctx.setLineDash([6, 5]);
      ctx.strokeStyle = COL.oneRad;
      ctx.lineWidth = 2;
      ctx.shadowColor = "rgba(251, 191, 36, 0.6)";
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(oneX, oneY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;
      ctx.fillStyle = COL.oneRad;
      ctx.beginPath();
      ctx.arc(oneX, oneY, 5, 0, Math.PI * 2);
      ctx.fill();

      const startAng = -Math.PI / 2;
      const endAng = startAng + thetaR;
      const arcColor = nearOne ? COL.near : COL.arc;

      if (thetaR > 0.001) {
        ctx.fillStyle = nearOne ? "rgba(251, 113, 133, 0.18)" : "rgba(56, 189, 248, 0.15)";
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, drawR, startAng, endAng);
        ctx.closePath();
        ctx.fill();

        ctx.save();
        ctx.shadowColor = nearOne ? "rgba(251, 113, 133, 0.7)" : "rgba(56, 189, 248, 0.65)";
        ctx.shadowBlur = nearOne ? 16 : 12;
        ctx.strokeStyle = arcColor;
        ctx.lineWidth = nearOne ? 5 : 4;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.arc(cx, cy, drawR, startAng, endAng);
        ctx.stroke();
        ctx.restore();
      }

      ctx.strokeStyle = COL.axis;
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(ox, oy);
      ctx.stroke();
      ctx.fillStyle = COL.axis;
      ctx.font = "500 10px Inter, Noto Sans JP, sans-serif";
      ctx.fillText("0°", ox + 6, oy - 4);

      const rx = cx + drawR * Math.cos(endAng);
      const ry = cy + drawR * Math.sin(endAng);
      ctx.strokeStyle = arcColor;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = nearOne ? "rgba(251, 113, 133, 0.5)" : "rgba(56, 189, 248, 0.45)";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(rx, ry);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = arcColor;
      ctx.beginPath();
      ctx.arc(rx, ry, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#e2e8f0";
      ctx.font = "700 12px Inter, Noto Sans JP, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("O", cx - 14, cy + 4);
      ctx.textAlign = "left";
    }

    document.getElementById("rSlider").addEventListener("input", () => {
      if (!animating) syncSliders();
    });
    document.getElementById("thetaSlider").addEventListener("input", () => {
      if (!animating) syncSliders();
    });
    animBtn.addEventListener("click", (e) => {
      e.preventDefault();
      toggleAnimation();
    });
    document.getElementById("resetBtn").addEventListener("click", (e) => {
      e.preventDefault();
      resetSimulation();
    });

    window.addEventListener("resize", () => draw());
    if (window.visualViewport) window.visualViewport.addEventListener("resize", () => draw());
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(() => draw()).observe(canvasWrap);
    }

    resetSimulation();

    let lastTime = 0;
    function loop(t) {
      const dt = Math.min((t - lastTime) / 1000, MAX_DT);
      lastTime = t;
      if (dt > 0) update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
