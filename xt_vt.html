<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>x–t / v–t グラフ — 1章 物体の運動</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(12px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: #4a7099;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: 90%;
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 16px;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 30px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-row button {
      flex: 1;
      padding: 14px 8px;
      min-height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #startBtn {
      background: #00aaff;
      color: white;
      box-shadow: 0 0 10px #66d0ff;
    }

    #stopBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #cc3355;
      border: 2px solid rgba(204, 51, 85, 0.35);
    }

    #stopBtn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #resetBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }

    .canvas-wrap {
      width: 95vw;
      max-width: 100%;
      margin-top: 8px;
    }

    .canvas-label {
      margin: 0 0 4px 4px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a7099;
    }

    canvas {
      display: block;
      width: 100%;
      height: 24vh;
      height: 24dvh;
      min-height: 140px;
      border-radius: 12px;
      background: white;
      touch-action: none;
      box-shadow: 0 0 16px rgba(0, 150, 255, 0.25);
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>x–t / v–t グラフ</h2>
    <p class="chapter-label">1章　物体の運動</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <label>
      初速度 v₀ (m/s):
      <input id="v0Slider" type="range" min="-50" max="50" step="1" value="10">
      <span id="v0Value">10</span>
    </label>

    <label>
      加速度 a (m/s²):
      <input id="aSlider" type="range" min="-20" max="20" step="0.5" value="2">
      <span id="aValue">2.0</span>
    </label>

    <div class="btn-row">
      <button id="startBtn" type="button">スタート</button>
      <button id="stopBtn" type="button" disabled>停止</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div class="canvas-wrap">
    <p class="canvas-label">位置（x 軸上の運動）</p>
    <canvas id="motionCanvas"></canvas>
  </div>

  <div class="canvas-wrap">
    <p class="canvas-label">位置–時間グラフ（x–t）</p>
    <canvas id="xtCanvas"></canvas>
  </div>

  <div class="canvas-wrap">
    <p class="canvas-label">速度–時間グラフ（v–t）</p>
    <canvas id="vtCanvas"></canvas>
  </div>

  <script>
    const motionCanvas = document.getElementById("motionCanvas");
    const xtCanvas = document.getElementById("xtCanvas");
    const vtCanvas = document.getElementById("vtCanvas");
    const motionCtx = motionCanvas.getContext("2d");
    const xtCtx = xtCanvas.getContext("2d");
    const vtCtx = vtCanvas.getContext("2d");

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    const v0Slider = document.getElementById("v0Slider");
    const aSlider = document.getElementById("aSlider");
    const v0Value = document.getElementById("v0Value");
    const aValue = document.getElementById("aValue");

    const MAX_DT = 1 / 30;
    const MARGIN = { left: 44, right: 16, top: 28, bottom: 28 };
    const X0 = 0;

    let v0 = parseFloat(v0Slider.value);
    let a = parseFloat(aSlider.value);
    let simV0 = v0;
    let simA = a;
    let t = 0;
    let running = false;
    let stopped = false;
    let xtHistory = [{ t: 0, x: X0 }];
    let vtHistory = [{ t: 0, v: v0 }];

    function fmt(value, digits) {
      return Number(value).toFixed(digits);
    }

    function positionAt(time) {
      return X0 + simV0 * time + 0.5 * simA * time * time;
    }

    function velocityAt(time) {
      return simV0 + simA * time;
    }

    function currentState() {
      return { x: positionAt(t), v: velocityAt(t) };
    }

    function syncSliders() {
      v0 = parseFloat(v0Slider.value);
      a = parseFloat(aSlider.value);
      v0Value.textContent = v0;
      aValue.textContent = Number.isInteger(a) ? a : a.toFixed(1);
      if (!running && !stopped) {
        simV0 = v0;
        simA = a;
        if (t === 0) {
          xtHistory = [{ t: 0, x: X0 }];
          vtHistory = [{ t: 0, v: simV0 }];
        }
      }
    }

    function updateButtons() {
      stopBtn.disabled = !running;
    }

    function resetSimulation() {
      syncSliders();
      simV0 = v0;
      simA = a;
      t = 0;
      running = false;
      stopped = false;
      xtHistory = [{ t: 0, x: X0 }];
      vtHistory = [{ t: 0, v: simV0 }];
      updateButtons();
    }

    function stopSimulation() {
      if (!running) return;
      running = false;
      stopped = true;
      updateButtons();
    }

    function startSimulation() {
      syncSliders();
      simV0 = v0;
      simA = a;
      t = 0;
      running = true;
      stopped = false;
      xtHistory = [{ t: 0, x: X0 }];
      vtHistory = [{ t: 0, v: simV0 }];
      updateButtons();
    }

    function resizeCanvases() {
      const viewport = window.visualViewport;
      const width = viewport ? viewport.width : window.innerWidth;
      const height = viewport ? viewport.height : window.innerHeight;
      const w = Math.max(320, Math.floor(width * 0.95));
      const h = Math.max(140, Math.floor(height * 0.24));
      [motionCanvas, xtCanvas, vtCanvas].forEach((c) => {
        c.width = w;
        c.height = h;
      });
    }

    function bindSlider(slider, onChange) {
      slider.addEventListener("input", onChange);
      slider.addEventListener("change", onChange);
    }

    bindSlider(v0Slider, syncSliders);
    bindSlider(aSlider, syncSliders);

    startBtn.addEventListener("click", (e) => { e.preventDefault(); startSimulation(); });
    stopBtn.addEventListener("click", (e) => { e.preventDefault(); stopSimulation(); });
    resetBtn.addEventListener("click", (e) => { e.preventDefault(); resetSimulation(); });

    resizeCanvases();
    resetSimulation();
    window.addEventListener("resize", resizeCanvases);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resizeCanvases);
    }

    function update(dt) {
      if (!running) return;
      t += dt;
      xtHistory.push({ t, x: positionAt(t) });
      vtHistory.push({ t, v: velocityAt(t) });
      if (xtHistory.length > 2000) xtHistory.shift();
      if (vtHistory.length > 2000) vtHistory.shift();
    }

    function niceStep(range, targetTicks) {
      const rough = range / targetTicks;
      const pow = Math.pow(10, Math.floor(Math.log10(rough)));
      const candidates = [1, 2, 5, 10];
      for (let i = 0; i < candidates.length; i += 1) {
        if (candidates[i] * pow >= rough) return candidates[i] * pow;
      }
      return pow * 10;
    }

    function computeTimeRange() {
      return { tMax: Math.max(t, 2) };
    }

    function computeXRange(tMax) {
      let xMin = Math.min(X0, positionAt(tMax));
      let xMax = Math.max(X0, positionAt(tMax));
      if (simA !== 0) {
        const tTurn = -simV0 / simA;
        if (tTurn > 0 && tTurn <= tMax) {
          const xTurn = positionAt(tTurn);
          xMin = Math.min(xMin, xTurn);
          xMax = Math.max(xMax, xTurn);
        }
      }
      const pad = Math.max(5, (xMax - xMin) * 0.15);
      if (xMax - xMin < 10) {
        const mid = (xMin + xMax) / 2;
        xMin = mid - 5;
        xMax = mid + 5;
      }
      return { xMin: xMin - pad, xMax: xMax + pad };
    }

    function computeVRange(tMax) {
      let vMin = Math.min(simV0, velocityAt(tMax));
      let vMax = Math.max(simV0, velocityAt(tMax));
      const pad = Math.max(2, (vMax - vMin) * 0.15);
      if (vMax - vMin < 4) {
        const mid = (vMin + vMax) / 2;
        vMin = mid - 2;
        vMax = mid + 2;
      }
      return { vMin: vMin - pad, vMax: vMax + pad };
    }

    function drawMotionView(state) {
      const ctx = motionCtx;
      const w = motionCanvas.width;
      const h = motionCanvas.height;
      const { xMin, xMax } = computeXRange(Math.max(t, 1));
      const plotW = w - MARGIN.left - MARGIN.right;
      const axisY = h - MARGIN.bottom;

      function xToPx(x) {
        return MARGIN.left + ((x - xMin) / (xMax - xMin)) * plotW;
      }

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = "#004c99";
      ctx.font = "13px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.fillText(`t = ${fmt(t, 2)} s`, 10, 18);
      ctx.fillText(`x = ${fmt(state.x, 2)} m`, 10, 38);
      ctx.fillText(`v = ${fmt(state.v, 2)} m/s`, 10, 58);

      ctx.strokeStyle = "#d0e8ff";
      ctx.lineWidth = 1;
      const step = niceStep(xMax - xMin, 5);
      for (let x = Math.ceil(xMin / step) * step; x <= xMax; x += step) {
        const px = xToPx(x);
        ctx.beginPath();
        ctx.moveTo(px, MARGIN.top);
        ctx.lineTo(px, axisY + 6);
        ctx.stroke();
        ctx.fillStyle = "#7a9fbf";
        ctx.font = "10px Inter, Poppins, sans-serif";
        ctx.fillText(String(Math.round(x)), px - 8, axisY + 18);
      }

      ctx.strokeStyle = "#66bfff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(MARGIN.left, axisY);
      ctx.lineTo(w - MARGIN.right, axisY);
      ctx.stroke();

      const ballX = xToPx(state.x);
      ctx.fillStyle = "#00aaff";
      ctx.shadowColor = "#66d0ff";
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(ballX, axisY, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#7a9fbf";
      ctx.font = "11px Inter, Poppins, sans-serif";
      ctx.fillText("x (m)", w - MARGIN.right - 28, axisY + 18);
    }

    function drawAxisLabels(ctx, w, h, xLabel, yLabel) {
      ctx.fillStyle = "#7a9fbf";
      ctx.font = "11px Inter, Poppins, sans-serif";
      ctx.fillText(xLabel, w - MARGIN.right - 28, h - 8);
      ctx.save();
      ctx.translate(12, MARGIN.top + 12);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(yLabel, 0, 0);
      ctx.restore();
    }

    function drawXtGraph() {
      const ctx = xtCtx;
      const w = xtCanvas.width;
      const h = xtCanvas.height;
      const { tMax } = computeTimeRange();
      const { xMin, xMax } = computeXRange(tMax);
      const plotW = w - MARGIN.left - MARGIN.right;
      const plotH = h - MARGIN.top - MARGIN.bottom;

      function tToPx(time) {
        return MARGIN.left + (time / tMax) * plotW;
      }

      function xToPx(x) {
        return MARGIN.top + plotH * ((xMax - x) / (xMax - xMin));
      }

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = "#d0e8ff";
      ctx.lineWidth = 1;
      const xStep = niceStep(xMax - xMin, 4);
      for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
        const py = xToPx(x);
        ctx.beginPath();
        ctx.moveTo(MARGIN.left, py);
        ctx.lineTo(w - MARGIN.right, py);
        ctx.stroke();
      }

      ctx.strokeStyle = "#cccccc";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(MARGIN.left, MARGIN.top);
      ctx.lineTo(MARGIN.left, h - MARGIN.bottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(MARGIN.left, h - MARGIN.bottom);
      ctx.lineTo(w - MARGIN.right, h - MARGIN.bottom);
      ctx.stroke();

      ctx.strokeStyle = "#2288dd";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      xtHistory.forEach((point, i) => {
        const px = tToPx(point.t);
        const py = xToPx(point.x);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();

      if (xtHistory.length > 0) {
        const last = xtHistory[xtHistory.length - 1];
        ctx.fillStyle = "#00aaff";
        ctx.beginPath();
        ctx.arc(tToPx(last.t), xToPx(last.x), 5, 0, Math.PI * 2);
        ctx.fill();
      }

      drawAxisLabels(ctx, w, h, "t (s)", "x (m)");
    }

    function drawVtGraph() {
      const ctx = vtCtx;
      const w = vtCanvas.width;
      const h = vtCanvas.height;
      const { tMax } = computeTimeRange();
      const { vMin, vMax } = computeVRange(tMax);
      const plotW = w - MARGIN.left - MARGIN.right;
      const plotH = h - MARGIN.top - MARGIN.bottom;

      function tToPx(time) {
        return MARGIN.left + (time / tMax) * plotW;
      }

      function vToPx(v) {
        return MARGIN.top + plotH * ((vMax - v) / (vMax - vMin));
      }

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = "#d0e8ff";
      ctx.lineWidth = 1;
      const vStep = niceStep(vMax - vMin, 4);
      for (let v = Math.ceil(vMin / vStep) * vStep; v <= vMax; v += vStep) {
        const py = vToPx(v);
        ctx.beginPath();
        ctx.moveTo(MARGIN.left, py);
        ctx.lineTo(w - MARGIN.right, py);
        ctx.stroke();
      }

      if (vMin < 0 && vMax > 0) {
        ctx.strokeStyle = "#99ccee";
        ctx.lineWidth = 1.5;
        const zeroY = vToPx(0);
        ctx.beginPath();
        ctx.moveTo(MARGIN.left, zeroY);
        ctx.lineTo(w - MARGIN.right, zeroY);
        ctx.stroke();
      }

      ctx.strokeStyle = "#cccccc";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(MARGIN.left, MARGIN.top);
      ctx.lineTo(MARGIN.left, h - MARGIN.bottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(MARGIN.left, h - MARGIN.bottom);
      ctx.lineTo(w - MARGIN.right, h - MARGIN.bottom);
      ctx.stroke();

      ctx.strokeStyle = "#00bfff";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      vtHistory.forEach((point, i) => {
        const px = tToPx(point.t);
        const py = vToPx(point.v);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();

      if (vtHistory.length > 0) {
        const last = vtHistory[vtHistory.length - 1];
        ctx.fillStyle = "#00e0ff";
        ctx.beginPath();
        ctx.arc(tToPx(last.t), vToPx(last.v), 5, 0, Math.PI * 2);
        ctx.fill();
      }

      drawAxisLabels(ctx, w, h, "t (s)", "v (m/s)");
    }

    function draw() {
      if (!running) syncSliders();
      const state = currentState();
      drawMotionView(state);
      drawXtGraph();
      drawVtGraph();
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, MAX_DT);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
