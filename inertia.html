<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>慣性の法則 — 運動の法則</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(135deg, #e8f4ff, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      min-height: 100dvh;
    }

    h2 {
      margin-top: 16px;
      font-weight: 600;
      color: #004c99;
      text-shadow: 0 0 8px #aee0ff;
    }

    .chapter-label {
      margin: 4px 0 0;
      font-size: 0.82rem;
      color: #4a7099;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: min(520px, 92vw);
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 15px;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 30px;
    }

    .hint {
      margin: 0;
      font-size: 0.82rem;
      color: #4a7099;
      line-height: 1.55;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-row button {
      flex: 1 1 calc(33% - 8px);
      min-width: 88px;
      padding: 14px 10px;
      min-height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #startBtn {
      background: #00aaff;
      color: white;
      border: none;
      box-shadow: 0 0 10px #66d0ff;
    }

    #pauseBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }

    #resetBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }

    #statusPanel {
      width: min(520px, 92vw);
      margin: 10px 0 0;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(0, 140, 220, 0.2);
      color: #004c99;
    }

    #statusPanel.inertia {
      color: #007744;
      border-color: rgba(0, 170, 100, 0.28);
    }

    .canvas-section {
      width: 95vw;
      max-width: 100%;
      margin-top: 8px;
    }

    .canvas-wrap {
      width: 100%;
      height: min(360px, 48dvh);
      min-height: 260px;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 12px;
      background: white;
      touch-action: none;
      box-shadow: 0 0 16px rgba(0, 150, 255, 0.25);
    }

    .legend {
      width: min(520px, 92vw);
      margin: 10px 0 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.45);
      font-size: 0.82rem;
      line-height: 1.8;
      color: #4a7099;
    }

    .legend span { font-weight: 600; }
    .lg-fb { color: #0088dd; }
    .lg-fr { color: #ee4455; }
    .lg-v { color: #22aa55; }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>慣性の法則</h2>
    <p class="chapter-label">4章　運動の法則 — 第1法則</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <label>
      初速度 v₀ (m/s):
      <input id="v0Slider" type="range" min="-30" max="30" step="1" value="8">
      <span id="v0Value">8</span>
    </label>

    <label>
      外力 F (N):
      <input id="fSlider" type="range" min="-50" max="50" step="1" value="0">
      <span id="fValue">0</span>
    </label>

    <label>
      質量 m (kg):
      <input id="mSlider" type="range" min="1" max="10" step="0.1" value="2">
      <span id="mValue">2.0</span>
    </label>

    <p class="hint">
      第1法則（慣性）：F = 0 のとき a = 0 となり、物体は等速直線運動を続けます。
      F を 0 に戻すと、再び速度一定の運動に戻ります。
    </p>

    <div class="btn-row">
      <button id="startBtn" type="button">スタート</button>
      <button id="pauseBtn" type="button">停止</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div id="statusPanel">スタートで運動を開始</div>

  <div class="canvas-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div class="legend">
    <span class="lg-fb">→ 青：右向きの力 F</span>　
    <span class="lg-fr">→ 赤：左向きの力 F</span>　
    <span class="lg-v">→ 緑：速度 v</span>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const canvasWrap = document.getElementById("canvasWrap");
    const statusPanel = document.getElementById("statusPanel");
    const v0Slider = document.getElementById("v0Slider");
    const fSlider = document.getElementById("fSlider");
    const mSlider = document.getElementById("mSlider");

    const MAX_DT = 1 / 30;
    const X_MIN = -20;
    const X_MAX = 20;

    let x = 0;
    let v = 0;
    let running = false;
    let paused = false;

    const DEFAULTS = { v0: 8, F: 0, m: 2 };

    function fmt(n, d) {
      return Number(n).toFixed(d);
    }

    function syncSliders() {
      document.getElementById("v0Value").textContent = v0Slider.value;
      document.getElementById("fValue").textContent = fSlider.value;
      document.getElementById("mValue").textContent = fmt(parseFloat(mSlider.value), 1);
    }

    function getF() {
      return parseFloat(fSlider.value);
    }

    function getM() {
      return parseFloat(mSlider.value);
    }

    function getA() {
      return getF() / getM();
    }

    function resetSimulation() {
      v0Slider.value = DEFAULTS.v0;
      fSlider.value = DEFAULTS.F;
      mSlider.value = DEFAULTS.m;
      x = 0;
      v = DEFAULTS.v0;
      running = false;
      paused = false;
      syncSliders();
      statusPanel.textContent = "スタートで運動を開始";
      statusPanel.className = "";
    }

    function startSimulation() {
      if (!running) {
        v = parseFloat(v0Slider.value);
        x = 0;
      }
      running = true;
      paused = false;
      syncSliders();
    }

    function pauseSimulation() {
      if (!running) return;
      paused = !paused;
      statusPanel.textContent = paused ? "一時停止中" : "運動中";
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const w = Math.max(280, Math.round(rect.width));
      const h = Math.max(220, Math.round(rect.height));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    [v0Slider, fSlider, mSlider].forEach((s) => {
      s.addEventListener("input", syncSliders);
      s.addEventListener("change", syncSliders);
    });

    document.getElementById("startBtn").addEventListener("click", (e) => {
      e.preventDefault();
      startSimulation();
    });

    document.getElementById("pauseBtn").addEventListener("click", (e) => {
      e.preventDefault();
      pauseSimulation();
    });

    document.getElementById("resetBtn").addEventListener("click", (e) => {
      e.preventDefault();
      resetSimulation();
    });

    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(resizeCanvas).observe(canvasWrap);
    }

    requestAnimationFrame(() => {
      resizeCanvas();
      resetSimulation();
    });

    function update(dt) {
      if (!running || paused) return;
      const F = getF();
      const a = F / getM();
      v += a * dt;
      x += v * dt;
      if (x < X_MIN) {
        x = X_MIN;
        v = 0;
      } else if (x > X_MAX) {
        x = X_MAX;
        v = 0;
      }
    }

    function worldToScreen(posX, w) {
      const pad = 40;
      const trackW = w - pad * 2;
      const t = (posX - X_MIN) / (X_MAX - X_MIN);
      return pad + t * trackW;
    }

    function drawCart(cx, cy) {
      const bw = 72;
      const bh = 40;
      ctx.fillStyle = "#ddeeff";
      ctx.strokeStyle = "#4488bb";
      ctx.lineWidth = 2.5;
      ctx.fillRect(cx - bw / 2, cy - bh / 2, bw, bh);
      ctx.strokeRect(cx - bw / 2, cy - bh / 2, bw, bh);

      ctx.fillStyle = "#556677";
      const wheelY = cy + bh / 2 - 2;
      [-22, 22].forEach((dx) => {
        ctx.beginPath();
        ctx.arc(cx + dx, wheelY, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#334455";
        ctx.lineWidth = 2;
        ctx.stroke();
      });

      ctx.strokeStyle = "#6699bb";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - bw / 2 + 8, cy - bh / 2);
      ctx.lineTo(cx - bw / 2 + 8, cy - bh / 2 - 16);
      ctx.stroke();
    }

    function drawArrowFrom(x0, y0, dx, dy, color, lw) {
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 3) return;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x0 + dx, y0 + dy);
      ctx.stroke();
      const ang = Math.atan2(dy, dx);
      const head = Math.min(12, len * 0.3);
      const tx = x0 + dx;
      const ty = y0 + dy;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - head * Math.cos(ang - Math.PI / 7), ty - head * Math.sin(ang - Math.PI / 7));
      ctx.lineTo(tx - head * Math.cos(ang + Math.PI / 7), ty - head * Math.sin(ang + Math.PI / 7));
      ctx.closePath();
      ctx.fill();
    }

    function drawTrack(w, groundY) {
      ctx.fillStyle = "#eef6ff";
      ctx.fillRect(0, groundY - 6, w, canvas.height - groundY + 6);
      ctx.strokeStyle = "#aacce8";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(24, groundY);
      ctx.lineTo(w - 24, groundY);
      ctx.stroke();

      ctx.fillStyle = "rgba(0, 76, 153, 0.08)";
      for (let i = 0; i <= 8; i += 1) {
        const sx = worldToScreen(X_MIN + (X_MAX - X_MIN) * (i / 8), w);
        ctx.fillRect(sx - 1, groundY - 18, 2, 18);
      }
      ctx.fillStyle = "#7a9fbf";
      ctx.font = "10px Inter, Poppins, sans-serif";
      ctx.fillText(`${X_MIN} m`, 28, groundY + 18);
      ctx.textAlign = "right";
      ctx.fillText(`${X_MAX} m`, w - 28, groundY + 18);
      ctx.textAlign = "start";
    }

    function drawHud(F, a) {
      const lines = [
        `v = ${fmt(v, 2)} m/s`,
        `F = ${fmt(F, 0)} N`,
        `a = ${fmt(a, 2)} m/s²`
      ];
      ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
      ctx.fillRect(12, 12, 148, 72);
      ctx.strokeStyle = "rgba(0, 76, 153, 0.15)";
      ctx.lineWidth = 1;
      ctx.strokeRect(12, 12, 148, 72);
      ctx.fillStyle = "#004c99";
      ctx.font = "600 13px Inter, Poppins, Noto Sans JP, sans-serif";
      lines.forEach((line, i) => ctx.fillText(line, 22, 34 + i * 20));
    }

    function draw() {
      syncSliders();
      const w = canvas.width;
      const h = canvas.height;
      const F = getF();
      const a = getA();
      const groundY = h * 0.68;
      const cx = worldToScreen(x, w);
      const cy = groundY - 28;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#f8fcff";
      ctx.fillRect(0, 0, w, h);

      drawTrack(w, groundY);
      drawCart(cx, cy);

      const vScale = 2.2;
      const vLen = v * vScale;
      if (Math.abs(v) > 0.05) {
        drawArrowFrom(cx, cy - 42, vLen, 0, "#22aa55", 3.5);
        ctx.fillStyle = "#22aa55";
        ctx.font = "bold 11px Inter, Noto Sans JP, sans-serif";
        ctx.fillText(`v=${fmt(v, 1)}`, cx + vLen + 6, cy - 46);
      }

      if (Math.abs(F) > 0.5) {
        const fScale = 1.1;
        const fLen = F * fScale;
        const color = F > 0 ? "#0088dd" : "#ee4455";
        drawArrowFrom(cx, cy + 38, fLen, 0, color, 3.5);
        ctx.fillStyle = color;
        ctx.font = "bold 11px Inter, Noto Sans JP, sans-serif";
        const labelX = F > 0 ? cx + fLen + 6 : cx + fLen - 52;
        ctx.fillText(`F=${fmt(F, 0)}N`, labelX, cy + 42);
      }

      drawHud(F, a);

      if (running && !paused) {
        if (Math.abs(F) < 0.5 && Math.abs(a) < 0.01) {
          statusPanel.textContent = "F = 0 → 等速直線運動（慣性の法則）";
          statusPanel.className = "inertia";
        } else if (Math.abs(F) >= 0.5) {
          statusPanel.textContent = "外力 F により加速度 a = F/m";
          statusPanel.className = "";
        } else {
          statusPanel.textContent = "運動中";
          statusPanel.className = "";
        }
      }
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, MAX_DT);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
