<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>作用・反作用の法則 — 運動の3法則</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Poppins", "Noto Sans JP", sans-serif;
      background: linear-gradient(160deg, #dceeff 0%, #f5faff 45%, #ffffff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #003366;
      padding: max(12px, env(safe-area-inset-top)) 0 max(16px, env(safe-area-inset-bottom));
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      min-height: 100dvh;
    }

    h2 { margin-top: 16px; font-weight: 600; color: #004c99; text-shadow: 0 0 8px #aee0ff; }
    .chapter-label { margin: 4px 0 0; font-size: 0.82rem; color: #4a7099; }
    .page-header { display: flex; flex-direction: column; align-items: center; }

    #back {
      margin-top: 10px;
      padding: 10px 16px;
      background: #00aaff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 0 10px #66d0ff;
      -webkit-tap-highlight-color: transparent;
    }

    #ui {
      width: min(520px, 92vw);
      margin: 10px;
      padding: 15px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.42);
      box-shadow: 0 4px 20px rgba(0, 100, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label { font-size: 15px; font-weight: 500; }
    input[type="range"] { width: 100%; height: 30px; accent-color: #00aaff; }
    .hint { margin: 0; font-size: 0.82rem; color: #4a7099; line-height: 1.55; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-row button {
      flex: 1 1 calc(33% - 8px);
      min-width: 88px;
      padding: 14px 10px;
      min-height: 48px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #startBtn { background: #00aaff; color: white; border: none; box-shadow: 0 0 10px #66d0ff; }
    #pauseBtn, #resetBtn {
      background: rgba(255, 255, 255, 0.75);
      color: #004c99;
      border: 2px solid rgba(0, 170, 255, 0.35);
    }

    #statusPanel {
      width: min(520px, 92vw);
      margin: 10px 0 0;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.52);
      border: 2px solid rgba(0, 140, 220, 0.2);
      color: #004c99;
    }

    .canvas-section { width: 95vw; max-width: 640px; margin-top: 8px; }

    .canvas-label {
      margin: 0 0 4px 4px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a7099;
    }

    .canvas-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0, 120, 200, 0.18);
    }

    .canvas-wrap.scene {
      height: min(340px, 42dvh);
      min-height: 260px;
    }

    .canvas-wrap.graph {
      height: min(260px, 30dvh);
      min-height: 200px;
      margin-top: 10px;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; touch-action: none; }

    .graph-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin: 8px 4px 0;
      font-size: 0.82rem;
      color: #4a7099;
    }

    .graph-legend span { font-weight: 600; }
    .lg-a { color: #0088cc; }
    .lg-b { color: #d4884a; }

    .formula-box {
      width: min(520px, 92vw);
      margin: 10px 0 16px;
      padding: 14px 16px;
      border-radius: 14px;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.48);
      font-size: 0.88rem;
      line-height: 1.75;
      color: #004c99;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h2>作用・反作用の法則</h2>
    <p class="chapter-label">4章　運動の3法則 — 第3法則</p>
    <a id="back" href="index.html">← ホームへ戻る</a>
  </div>

  <div id="ui">
    <label>
      AがBを押す力 F (N):
      <input id="fSlider" type="range" min="0" max="100" step="1" value="30">
      <span id="fValue">30</span>
    </label>
    <label>
      質量 m<sub>A</sub> (kg):
      <input id="mASlider" type="range" min="1" max="100" step="1" value="40">
      <span id="mAValue">40</span>
    </label>
    <label>
      質量 m<sub>B</sub> (kg):
      <input id="mBSlider" type="range" min="1" max="100" step="1" value="60">
      <span id="mBValue">60</span>
    </label>
    <p class="hint">同じ F でも質量が小さい A のほうが |a| が大きい → v–t グラフの傾きが急になります。</p>
    <div class="btn-row">
      <button id="startBtn" type="button">スタート</button>
      <button id="pauseBtn" type="button">停止</button>
      <button id="resetBtn" type="button">リセット</button>
    </div>
  </div>

  <div id="statusPanel">スタートで2人が押し合って動き出します</div>

  <div class="canvas-section">
    <p class="canvas-label">押し合いの様子</p>
    <div class="canvas-wrap scene" id="sceneWrap">
      <canvas id="sceneCanvas"></canvas>
    </div>
    <p class="canvas-label">v–t グラフ（A と B を重ねて表示）</p>
    <div class="graph-legend">
      <span class="lg-a">● A（左へ）　傾き = aA = −F/mA</span>
      <span class="lg-b">● B（右へ）　傾き = aB = F/mB</span>
    </div>
    <div class="canvas-wrap graph" id="graphWrap">
      <canvas id="graphCanvas"></canvas>
    </div>
  </div>

  <div class="formula-box">
    第3法則：F<sub>A→B</sub> = −F<sub>B→A</sub>　｜F<sub>A→B</sub>｜ = ｜F<sub>B→A</sub>｜ = F
  </div>

  <script>
    const sceneCanvas = document.getElementById("sceneCanvas");
    const graphCanvas = document.getElementById("graphCanvas");
    const ctx = sceneCanvas.getContext("2d");
    const graphCtx = graphCanvas.getContext("2d");
    const sceneWrap = document.getElementById("sceneWrap");
    const graphWrap = document.getElementById("graphWrap");
    const statusPanel = document.getElementById("statusPanel");
    const fSlider = document.getElementById("fSlider");
    const mASlider = document.getElementById("mASlider");
    const mBSlider = document.getElementById("mBSlider");

    const MAX_DT = 1 / 30;
    const MARGIN = { left: 48, right: 16, top: 28, bottom: 36 };
    const X_MIN = -10;
    const X_MAX = 10;
    const DEFAULTS = { F: 30, mA: 40, mB: 60 };

    let xA = -0.45;
    let xB = 0.45;
    let vA = 0;
    let vB = 0;
    let simT = 0;
    let simF = DEFAULTS.F;
    let simMA = DEFAULTS.mA;
    let simMB = DEFAULTS.mB;
    let vtHistory = [{ t: 0, vA: 0, vB: 0 }];
    let running = false;
    let paused = false;
    let pushPhase = 0;

    function fmt(n, d) { return Number(n).toFixed(d); }
    function getF() { return parseFloat(fSlider.value); }
    function getMA() { return parseFloat(mASlider.value); }
    function getMB() { return parseFloat(mBSlider.value); }

    function syncSliders() {
      document.getElementById("fValue").textContent = fSlider.value;
      document.getElementById("mAValue").textContent = mASlider.value;
      document.getElementById("mBValue").textContent = mBSlider.value;
    }

    function resetSimulation() {
      fSlider.value = DEFAULTS.F;
      mASlider.value = DEFAULTS.mA;
      mBSlider.value = DEFAULTS.mB;
      xA = -0.45;
      xB = 0.45;
      vA = 0;
      vB = 0;
      simT = 0;
      simF = DEFAULTS.F;
      simMA = DEFAULTS.mA;
      simMB = DEFAULTS.mB;
      vtHistory = [{ t: 0, vA: 0, vB: 0 }];
      pushPhase = 0;
      running = false;
      paused = false;
      syncSliders();
      statusPanel.textContent = "スタートで2人が押し合って動き出します";
    }

    function startSimulation() {
      syncSliders();
      simF = getF();
      simMA = getMA();
      simMB = getMB();
      xA = -0.45;
      xB = 0.45;
      vA = 0;
      vB = 0;
      simT = 0;
      vtHistory = [{ t: 0, vA: 0, vB: 0 }];
      pushPhase = 0;
      running = true;
      paused = false;
    }

    function pauseSimulation() {
      if (!running) return;
      paused = !paused;
    }

    function resizeCanvases() {
      [ [sceneCanvas, sceneWrap, 260], [graphCanvas, graphWrap, 200] ].forEach(([c, wrap, minH]) => {
        const rect = wrap.getBoundingClientRect();
        const w = Math.max(300, Math.round(rect.width));
        const h = Math.max(minH, Math.round(rect.height));
        if (c.width !== w || c.height !== h) {
          c.width = w;
          c.height = h;
        }
      });
    }

    [fSlider, mASlider, mBSlider].forEach((s) => {
      s.addEventListener("input", syncSliders);
      s.addEventListener("change", syncSliders);
    });
    document.getElementById("startBtn").addEventListener("click", (e) => { e.preventDefault(); startSimulation(); });
    document.getElementById("pauseBtn").addEventListener("click", (e) => { e.preventDefault(); pauseSimulation(); });
    document.getElementById("resetBtn").addEventListener("click", (e) => { e.preventDefault(); resetSimulation(); });

    window.addEventListener("resize", resizeCanvases);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvases);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(resizeCanvases).observe(sceneWrap);
      new ResizeObserver(resizeCanvases).observe(graphWrap);
    }
    requestAnimationFrame(() => { resizeCanvases(); resetSimulation(); });

    function worldToScreen(x, w) {
      const pad = 48;
      return pad + ((x - X_MIN) / (X_MAX - X_MIN)) * (w - pad * 2);
    }

    function update(dt) {
      if (running && !paused) pushPhase += dt;
      if (!running || paused) return;

      const F = simF;
      if (F < 0.5) return;

      const aA = -F / simMA;
      const aB = F / simMB;
      vA += aA * dt;
      vB += aB * dt;
      xA += vA * dt;
      xB += vB * dt;
      simT += dt;
      vtHistory.push({ t: simT, vA, vB });
      if (vtHistory.length > 2500) vtHistory.shift();

      const edgeA = X_MIN + 1;
      const edgeB = X_MAX - 1;
      if (xA < edgeA) { xA = edgeA; vA = 0; }
      if (xB > edgeB) { xB = edgeB; vB = 0; }
    }

    function niceStep(range, ticks) {
      const rough = range / ticks;
      const pow = Math.pow(10, Math.floor(Math.log10(Math.max(rough, 1e-6))));
      for (const c of [1, 2, 5, 10]) {
        if (c * pow >= rough) return c * pow;
      }
      return pow * 10;
    }

    function formatTick(v) {
      const a = Math.abs(v);
      if (a >= 10) return v.toFixed(0);
      if (a >= 1) return v.toFixed(1);
      return v.toFixed(2);
    }

    function drawCombinedVtGraph() {
      const g = graphCtx;
      const w = graphCanvas.width;
      const h = graphCanvas.height;
      const F = simF;
      const aA = F > 0.5 ? -F / simMA : 0;
      const aB = F > 0.5 ? F / simMB : 0;
      const tMax = Math.max(simT, 1.2);
      const vEndA = aA * tMax;
      const vEndB = aB * tMax;
      let vMin = Math.min(0, vEndA, vA);
      let vMax = Math.max(0, vEndB, vB);
      const pad = Math.max(0.5, (vMax - vMin) * 0.12);
      vMin -= pad;
      vMax += pad;
      if (vMax - vMin < 2) {
        const mid = (vMin + vMax) / 2;
        vMin = mid - 1;
        vMax = mid + 1;
      }

      const plotW = w - MARGIN.left - MARGIN.right;
      const plotH = h - MARGIN.top - MARGIN.bottom;
      const tToPx = (time) => MARGIN.left + (time / tMax) * plotW;
      const vToPx = (val) => MARGIN.top + plotH * ((vMax - val) / (vMax - vMin));

      g.clearRect(0, 0, w, h);
      g.fillStyle = "#ffffff";
      g.fillRect(0, 0, w, h);

      g.strokeStyle = "#eef4fa";
      g.lineWidth = 1;
      const vStep = niceStep(vMax - vMin, 4);
      for (let val = Math.ceil(vMin / vStep) * vStep; val <= vMax; val += vStep) {
        const py = vToPx(val);
        g.beginPath();
        g.moveTo(MARGIN.left, py);
        g.lineTo(w - MARGIN.right, py);
        g.stroke();
      }
      const tStep = niceStep(tMax, 5);
      g.strokeStyle = "#dceaf8";
      for (let time = 0; time <= tMax; time += tStep) {
        const px = tToPx(time);
        g.beginPath();
        g.moveTo(px, MARGIN.top);
        g.lineTo(px, h - MARGIN.bottom);
        g.stroke();
      }

      if (vMin < 0 && vMax > 0) {
        g.strokeStyle = "#99bbdd";
        g.lineWidth = 1.5;
        g.beginPath();
        g.moveTo(MARGIN.left, vToPx(0));
        g.lineTo(w - MARGIN.right, vToPx(0));
        g.stroke();
      }

      g.strokeStyle = "#aacce0";
      g.lineWidth = 1.5;
      g.beginPath();
      g.moveTo(MARGIN.left, MARGIN.top);
      g.lineTo(MARGIN.left, h - MARGIN.bottom);
      g.lineTo(w - MARGIN.right, h - MARGIN.bottom);
      g.stroke();

      if (F > 0.5 && running) {
        g.setLineDash([6, 5]);
        g.lineWidth = 1.5;
        g.strokeStyle = "rgba(0, 136, 204, 0.45)";
        g.beginPath();
        g.moveTo(tToPx(0), vToPx(0));
        g.lineTo(tToPx(tMax), vToPx(aA * tMax));
        g.stroke();
        g.strokeStyle = "rgba(212, 136, 74, 0.45)";
        g.beginPath();
        g.moveTo(tToPx(0), vToPx(0));
        g.lineTo(tToPx(tMax), vToPx(aB * tMax));
        g.stroke();
        g.setLineDash([]);
      }

      function drawSeries(key, color) {
        g.strokeStyle = color;
        g.lineWidth = 2.8;
        g.beginPath();
        vtHistory.forEach((p, i) => {
          const px = tToPx(p.t);
          const py = vToPx(p[key]);
          if (i === 0) g.moveTo(px, py);
          else g.lineTo(px, py);
        });
        g.stroke();
        if (vtHistory.length) {
          const last = vtHistory[vtHistory.length - 1];
          g.fillStyle = color;
          g.beginPath();
          g.arc(tToPx(last.t), vToPx(last[key]), 5, 0, Math.PI * 2);
          g.fill();
        }
      }

      drawSeries("vA", "#0088cc");
      drawSeries("vB", "#d4884a");

      g.fillStyle = "#5a7a99";
      g.font = "10px Inter, Poppins, sans-serif";
      g.textAlign = "center";
      g.fillText("t (s)", w - MARGIN.right - 18, h - 10);
      g.save();
      g.translate(16, MARGIN.top + 6);
      g.rotate(-Math.PI / 2);
      g.textAlign = "left";
      g.fillText("v (m/s)", 0, 0);
      g.restore();
      g.textAlign = "start";

      g.fillStyle = "rgba(255,255,255,0.94)";
      g.strokeStyle = "rgba(0,76,153,0.12)";
      g.lineWidth = 1;
      const boxW = 210;
      const boxH = 68;
      g.fillRect(w - boxW - 12, 12, boxW, boxH);
      g.strokeRect(w - boxW - 12, 12, boxW, boxH);
      g.font = "600 11px Inter, Noto Sans JP, sans-serif";
      g.fillStyle = "#0088cc";
      g.fillText(`A: a = −F/mA = ${fmt(aA, 2)} m/s²`, w - boxW, 30);
      g.fillStyle = "#d4884a";
      g.fillText(`B: a = F/mB = ${fmt(aB, 2)} m/s²`, w - boxW, 50);
      if (F > 0.5 && simMA > 0) {
        g.fillStyle = "#4a7099";
        g.font = "10px Inter, Noto Sans JP, sans-serif";
        g.fillText(`|aA|/|aB| = mB/mA = ${fmt(simMB / simMA, 2)}`, w - boxW, 68);
      }
    }

    function drawBg(w, h, groundY) {
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, "#eef6ff");
      g.addColorStop(0.55, "#f8fcff");
      g.addColorStop(1, "#e8f2fa");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = "rgba(0, 100, 180, 0.06)";
      ctx.lineWidth = 1;
      for (let i = 1; i < 8; i += 1) {
        const y = groundY - i * 28;
        if (y < 40) break;
        ctx.beginPath();
        ctx.moveTo(24, y);
        ctx.lineTo(w - 24, y);
        ctx.stroke();
      }

      const fg = ctx.createLinearGradient(0, groundY, 0, h);
      fg.addColorStop(0, "#9ad4a0");
      fg.addColorStop(1, "#6fb876");
      ctx.fillStyle = fg;
      ctx.fillRect(0, groundY, w, h - groundY);

      ctx.fillStyle = "rgba(255,255,255,0.25)";
      for (let i = 0; i < 12; i += 1) {
        ctx.fillRect(i * (w / 12) + 4, groundY + 6, w / 24, 4);
      }

      ctx.strokeStyle = "#4a9460";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(w, groundY);
      ctx.stroke();
    }

    function drawLabelTag(x, y, text, color, align) {
      ctx.font = "600 11px Inter, Poppins, Noto Sans JP, sans-serif";
      ctx.textAlign = align || "left";
      ctx.textBaseline = "middle";
      const tw = ctx.measureText(text).width + 12;
      let hx = x - 6;
      if (align === "center") hx = x - tw / 2;
      else if (align === "right") hx = x - tw + 6;
      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.strokeStyle = "rgba(0, 76, 153, 0.12)";
      ctx.lineWidth = 1;
      ctx.fillRect(hx, y - 10, tw, 20);
      ctx.strokeRect(hx, y - 10, tw, 20);
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
      ctx.textAlign = "start";
      ctx.textBaseline = "alphabetic";
    }

    function drawForceArrow(x0, y0, x1, y1, color, label, labelSide) {
      const dx = x1 - x0;
      const dy = y1 - y0;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 6) return;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3.5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
      const ang = Math.atan2(dy, dx);
      const head = 11;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 - head * Math.cos(ang - Math.PI / 7), y1 - head * Math.sin(ang - Math.PI / 7));
      ctx.lineTo(x1 - head * Math.cos(ang + Math.PI / 7), y1 - head * Math.sin(ang + Math.PI / 7));
      ctx.closePath();
      ctx.fill();
      const lx = labelSide === "above" ? (x0 + x1) / 2 : (x0 + x1) / 2;
      const ly = labelSide === "above" ? y0 - 18 : y0 + 22;
      drawLabelTag(lx, ly, label, color, "center");
    }

    function drawPerson(cfg) {
      const {
        sx, groundY, facing, mass, tag, bodyColor, accent,
        partnerSx, pushing, velocity
      } = cfg;
      const scale = 0.85 + Math.sqrt(mass) * 0.025;
      const h = 78 * scale;
      const lean = pushing ? facing * 6 : 0;
      const footX = sx;
      const footY = groundY;
      const headX = footX + lean + facing * 2;
      const headY = footY - h;
      const hipY = footY - h * 0.52;
      const shoulderY = footY - h * 0.74;
      const shoulderX = footX + lean;

      const reachTarget = facing > 0
        ? Math.min(partnerSx - 18, sx + 52 * scale)
        : Math.max(partnerSx + 18, sx - 52 * scale);
      const handY = shoulderY + 6;
      const elbowX = shoulderX + facing * 18;
      const elbowY = shoulderY + 18;

      ctx.fillStyle = "rgba(0,40,80,0.08)";
      ctx.beginPath();
      ctx.ellipse(footX, footY + 4, 18 * scale, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 4 * scale;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.beginPath();
      ctx.moveTo(footX, footY);
      ctx.lineTo(footX + lean * 0.3, hipY);
      ctx.lineTo(shoulderX, shoulderY);
      ctx.lineTo(headX, headY);
      ctx.stroke();

      ctx.lineWidth = 3.2 * scale;
      ctx.beginPath();
      ctx.moveTo(shoulderX, shoulderY);
      ctx.lineTo(shoulderX - facing * 16 * scale, shoulderY + 22);
      ctx.moveTo(shoulderX, shoulderY);
      ctx.lineTo(elbowX, elbowY);
      ctx.lineTo(reachTarget, handY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(footX, footY);
      ctx.lineTo(footX - facing * 14 * scale, footY);
      ctx.moveTo(footX, footY);
      ctx.lineTo(footX + facing * 12 * scale, footY - 3);
      ctx.stroke();

      ctx.fillStyle = "#fff";
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(headX, headY - 11 * scale, 12 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      const badgeW = 54;
      ctx.fillStyle = accent;
      ctx.beginPath();
      ctx.roundRect(footX - badgeW / 2, footY + 10, badgeW, 22, 8);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "600 11px Inter, Noto Sans JP, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(`${tag}  ${fmt(mass, 0)}kg`, footX, footY + 25);

      if (Math.abs(velocity) > 0.08) {
        const vLen = Math.max(20, Math.min(64, Math.abs(velocity) * 14));
        drawForceArrow(
          footX, headY - 28 * scale,
          footX + Math.sign(velocity) * vLen, headY - 28 * scale,
          "#22aa55", `v=${fmt(velocity, 1)}`, "above"
        );
      }

      ctx.textAlign = "start";
      return { handX: reachTarget, handY, shoulderX, shoulderY, headX, headY };
    }

    function drawHud(F, mA, mB, aA, aB) {
      const lines = [
        ["F", `${fmt(F, 0)} N`],
        ["mA / mB", `${fmt(mA, 0)} / ${fmt(mB, 0)} kg`],
        ["aA", `${fmt(aA, 2)} m/s²`],
        ["aB", `${fmt(aB, 2)} m/s²`],
        ["vA / vB", `${fmt(vA, 2)} / ${fmt(vB, 2)} m/s`]
      ];
      const pw = 196;
      const ph = 16 + lines.length * 24;
      ctx.fillStyle = "rgba(255,255,255,0.94)";
      ctx.strokeStyle = "rgba(0, 120, 200, 0.18)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(14, 14, pw, ph, 12);
      ctx.fill();
      ctx.stroke();

      ctx.font = "600 12px Inter, Poppins, Noto Sans JP, sans-serif";
      lines.forEach(([k, val], i) => {
        const y = 36 + i * 24;
        ctx.fillStyle = "#4a7099";
        ctx.fillText(k, 26, y);
        ctx.fillStyle = "#004c99";
        ctx.textAlign = "right";
        ctx.fillText(val, 14 + pw - 12, y);
        ctx.textAlign = "left";
      });
    }

    function drawScene(w, h) {
      const F = running ? simF : getF();
      const mA = running ? simMA : getMA();
      const mB = running ? simMB : getMB();
      const aA = F > 0.5 ? -F / mA : 0;
      const aB = F > 0.5 ? F / mB : 0;
      const groundY = h * 0.76;
      const pushing = running && F > 0.5;

      drawBg(w, h, groundY);

      const sxA = worldToScreen(xA, w);
      const sxB = worldToScreen(xB, w);

      const personB = drawPerson({
        sx: sxB, groundY, facing: -1, mass: mB, tag: "B",
        bodyColor: "#c87840", accent: "#d4884a",
        partnerSx: sxA, pushing, velocity: vB
      });
      const personA = drawPerson({
        sx: sxA, groundY, facing: 1, mass: mA, tag: "A",
        bodyColor: "#3a7ab8", accent: "#0088cc",
        partnerSx: sxB, pushing, velocity: vA
      });

      if (F > 0.5) {
        const fPx = 28 + F * 0.55;
        const contactY = (personA.handY + personB.handY) / 2;
        const aHand = { x: personA.handX, y: personA.handY };
        const bHand = { x: personB.handX, y: personB.handY };

        ctx.strokeStyle = "rgba(80,80,80,0.35)";
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(aHand.x, aHand.y);
        ctx.lineTo(bHand.x, bHand.y);
        ctx.stroke();
        ctx.setLineDash([]);

        drawForceArrow(
          aHand.x, contactY - 10,
          aHand.x + fPx, contactY - 10,
          "#e84555", `A→B  ${fmt(F, 0)}N`, "above"
        );
        drawForceArrow(
          bHand.x, contactY + 10,
          bHand.x - fPx, contactY + 10,
          "#0088dd", `B→A  ${fmt(F, 0)}N`, "below"
        );
      }

      drawHud(F, mA, mB, aA, aB);

      ctx.fillStyle = "rgba(0, 76, 153, 0.55)";
      ctx.font = "500 10px Inter, Noto Sans JP, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("← 左へ", worldToScreen(X_MIN + 1, w), groundY + 28);
      ctx.fillText("右へ →", worldToScreen(X_MAX - 1, w), groundY + 28);
      ctx.textAlign = "start";
    }

    function draw() {
      syncSliders();
      ctx.clearRect(0, 0, sceneCanvas.width, sceneCanvas.height);
      drawScene(sceneCanvas.width, sceneCanvas.height);
      drawCombinedVtGraph();

      if (running && !paused) {
        const ratio = simMA > 0 ? (simMB / simMA).toFixed(2) : "—";
        statusPanel.textContent = `同じ F → 傾きの比 |aA|:|aB| = ${ratio} : 1（= mB:mA）`;
      } else if (paused) {
        statusPanel.textContent = "一時停止中";
      } else if (!running) {
        statusPanel.textContent = "スタートで2人が押し合って動き出します";
      }
    }

    let last = performance.now();
    function loop(now) {
      update(Math.min((now - last) / 1000, MAX_DT));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
